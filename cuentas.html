<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertidor de Cuentas R3 → S/4HANA · Telmex</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Calibri,Arial,sans-serif;background:#F4F6FB;color:#1A1A1A;min-height:100vh}
  
  /* Header */
  .hdr{background:#001E6E;padding:20px 28px;display:flex;align-items:center;gap:16px}
  .hdr-icon{width:40px;height:40px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center}
  .hdr-icon svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .hdr-title{color:#fff;font-size:18px;font-weight:700}
  .hdr-sub{color:#8AAEE0;font-size:12px;margin-top:2px}

  /* Contenido */
  .main{max-width:720px;margin:0 auto;padding:28px 16px}
  
  /* Buscador */
  .search-card{background:#fff;border-radius:14px;border:1px solid #E0E4EF;padding:24px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,30,110,.06)}
  .search-label{font-size:13px;font-weight:600;color:#5A5A5A;margin-bottom:10px;display:block}
  .search-row{display:flex;gap:10px}
  .search-input{flex:1;height:48px;padding:0 16px;font-size:18px;font-family:inherit;font-weight:700;letter-spacing:1px;border:2px solid #D0D6E8;border-radius:10px;outline:none;color:#001E6E;background:#fff;transition:border-color .15s}
  .search-input:focus{border-color:#001E6E;box-shadow:0 0 0 3px rgba(0,30,110,.12)}
  .search-btn{height:48px;padding:0 20px;background:#001E6E;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
  .search-btn:hover{background:#0033AA}
  .search-hint{font-size:11px;color:#AAAAAA;margin-top:8px}

  /* Resultados */
  .results{display:flex;flex-direction:column;gap:14px}
  
  /* Tarjeta resultado */
  .result-card{background:#fff;border-radius:14px;border:1px solid #E0E4EF;overflow:hidden;box-shadow:0 2px 8px rgba(0,30,110,.06)}
  .result-card.multiple{border-color:#FCD34D;background:#FFFDF0}
  
  .rc-header{padding:12px 18px;background:#F4F6FB;border-bottom:1px solid #E0E4EF;display:flex;align-items:center;gap:8px;font-size:12px;color:#5A5A5A}
  .rc-header.multiple{background:#FFF7E0;border-color:#FCD34D}
  .badge-multi{background:#F59E0B;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
  
  .rc-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;min-height:80px}
  .rc-col{padding:16px 18px}
  .rc-col-r3{border-right:1px solid #E0E4EF}
  .rc-arrow{display:flex;align-items:center;justify-content:center;padding:0 8px;color:#001E6E}
  .rc-arrow svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .rc-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:5px}
  .rc-label.r3{color:#6B7280}
  .rc-label.hana{color:#001E6E}
  .rc-number{font-size:20px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:1px;line-height:1.2}
  .rc-number.r3{color:#6B7280}
  .rc-number.hana{color:#001E6E}
  .rc-desc{font-size:12px;color:#5A5A5A;margin-top:4px;line-height:1.4}
  
  /* Múltiples HANA */
  .multi-list{border-top:1px solid #FCD34D}
  .multi-item{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:10px 18px;border-bottom:1px solid #FEF3C7}
  .multi-item:last-child{border-bottom:none}
  .multi-num{font-size:14px;font-weight:700;font-family:'Courier New',monospace;color:#001E6E}
  .multi-desc{font-size:11px;color:#5A5A5A;margin-top:2px}
  
  /* Estado vacío */
  .empty{text-align:center;padding:40px 20px;color:#AAAAAA}
  .empty-icon{font-size:40px;margin-bottom:12px}
  .empty-msg{font-size:14px}

  /* No encontrado */
  .not-found{background:#fff;border-radius:14px;border:2px solid #FCA5A5;padding:24px;text-align:center}
  .not-found-icon{font-size:32px;margin-bottom:10px}
  .not-found-msg{font-size:14px;color:#DC2626;font-weight:600}
  .not-found-sub{font-size:12px;color:#9CA3AF;margin-top:6px}

  @media(max-width:520px){
    .rc-body{grid-template-columns:1fr;}
    .rc-col-r3{border-right:none;border-bottom:1px solid #E0E4EF;}
    .rc-arrow{padding:4px 18px;justify-content:flex-start;}
    .multi-item{grid-template-columns:1fr;gap:4px;}
  }
</style>
</head>

const idxR3   = {};
const idxHANA = {};
DATA.forEach(d => {
  if(!idxR3[d.r3])   idxR3[d.r3]   = [];
  if(!idxHANA[d.hana]) idxHANA[d.hana] = [];
  idxR3[d.r3].push(d);
  idxHANA[d.hana].push(d);

function buscar() {
  const q = document.getElementById('qInput').value.trim();
  const out = document.getElementById('results');
  if(!q) { out.innerHTML = '<div class="empty"><div class="empty-icon">🔄</div><div class="empty-msg">Ingresa una cuenta para ver su equivalente</div></div>'; return; }

  const esNumero = /^\d+$/.test(q);
  let enR3 = [], enHANA = [], enDesc = [];

  if(esNumero){
    enR3   = idxR3[q]   || [];
    enHANA = idxHANA[q] || [];
  } else {
    // Búsqueda por descripción (R3 o HANA), insensible a mayúsculas y acentos
    const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    const qn = norm(q);
    enDesc = DATA.filter(d => norm(d.r3d).includes(qn) || norm(d.hanad).includes(qn));
  }

  if(!enR3.length && !enHANA.length && !enDesc.length) {
    out.innerHTML = `<div class="not-found">
      <div class="not-found-icon">❌</div>
      <div class="not-found-msg">No se encontró "${q}"</div>
      <div class="not-found-sub">Verifica el número o la descripción e intenta de nuevo</div>

    return;
  }

  let html = '';

  // Resultados como cuenta R3
  if(enR3.length) {
    const r3info = enR3[0];

    const hanaUnicos = [...new Map(enR3.map(d=>[d.hana, d])).values()];

    html += `<div class="result-card ${esMultiple?'multiple':''}">

    if(!esMultiple) {
      const h = hanaUnicos[0];
      html += `<div class="rc-body">
        <div class="rc-col rc-col-r3">
          <div class="rc-label r3">Cuenta R3</div>
          <div class="rc-number r3">${r3info.r3}</div>
          <div class="rc-desc">${r3info.r3d}</div>
        </div>
        <div class="rc-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        <div class="rc-col">
          <div class="rc-label hana">Cuenta S/4HANA</div>
          <div class="rc-number hana">${h.hana}</div>
          <div class="rc-desc">${h.hanad}</div>
        </div>
      </div>`;
    } else {
      html += `<div class="rc-body">
        <div class="rc-col rc-col-r3">
          <div class="rc-label r3">Cuenta R3</div>
          <div class="rc-number r3">${r3info.r3}</div>

          <div class="rc-desc" style="color:#F59E0B;font-weight:600">Varios — ver abajo</div>
        </div>
      </div>
      <div class="multi-list">
        ${hanaUnicos.map(h=>`<div class="multi-item">
          <div><div class="multi-num">${h.hana}</div><div class="multi-desc">${h.hanad}</div></div>
          <div></div><div></div>
        </div>`).join('')}
      </div>`;
    }
    html += '</div>';
  }

  // Resultados como cuenta HANA
  if(enHANA.length) {
    const r3Unicos = [...new Map(enHANA.map(d=>[d.r3, d])).values()];
    html += `<div class="result-card">
      <div class="rc-header">

      badgeExtra + '</div><div class="multi-list">' + filas + '</div></div>';
    if(enDesc.length > MAX) {
      html += '<div class="search-hint" style="text-align:center;padding:8px">Mostrando ' + MAX +
        ' de ' + enDesc.length + ' — intenta una búsqueda más específica</div>';
    }
  }

  out.innerHTML = html;
}

// Buscar al cargar si hay parámetro en URL
const params = new URLSearchParams(location.search);
if(params.get('q')) { document.getElementById('qInput').value = params.get('q'); buscar(); }
</script>
