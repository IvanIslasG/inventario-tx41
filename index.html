<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén Distribuidor Puebla · D041</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#eef2f6; --surface:#fff; --line:#dde4ec;
    --ink:#0f1b2d; --muted:#5b6b80;
    --primary:#0a4ea3; --primary-d:#073a7a; --accent:#00a3b4;
    --ok:#1a7f4b; --ok-bg:#e7f4ec; --low:#b45309; --low-bg:#fbf0df; --zero:#94a3b4;
    --dist:#b8860b; --dist-bg:#fdf6e3;
    --radius:12px; --shadow:0 1px 3px rgba(15,27,45,.08),0 1px 2px rgba(15,27,45,.04);
  }
  *{box-sizing:border-box}
  [hidden]{display:none !important}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  .num{font-variant-numeric:tabular-nums}
  button{font:inherit;cursor:pointer}

  /* ---- Gate ---- */
  #gate{position:fixed;inset:0;display:grid;place-items:center;
        background:linear-gradient(135deg,#073a7a,#0a4ea3 60%,#0c63c9);z-index:50;padding:20px}
  #gate .card{background:var(--surface);border-radius:14px;padding:28px;max-width:360px;width:100%;
              box-shadow:0 18px 50px rgba(0,0,0,.3)}
  #gate h1{margin:0 0 4px;font-size:19px}
  #gate p{margin:0 0 18px;color:var(--muted);font-size:13px}
  #gate label{display:block;font-weight:600;font-size:12px;margin-bottom:6px;color:var(--muted)}
  #gate input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font:inherit}
  #gate input:focus{outline:2px solid var(--primary);border-color:var(--primary)}
  #gate button{width:100%;margin-top:14px;padding:11px;background:var(--primary);color:#fff;border:0;
               border-radius:8px;font-weight:600}
  #gate button:hover{background:var(--primary-d)}
  #gate .err{color:#c0392b;font-size:13px;margin-top:10px;min-height:18px}
  #gate .alt{margin-top:14px;text-align:center;font-size:12px;color:var(--muted)}
  #gate .alt label{display:inline;color:var(--primary);cursor:pointer;text-decoration:underline;font-weight:600}

  /* ---- Shell ---- */
  header.bar{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .bar-in{max-width:1100px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{font-weight:700;font-size:15px;letter-spacing:.2px}
  .brand b{color:var(--primary)}
  .back{display:none;align-items:center;gap:6px;background:none;border:0;color:var(--primary);font-weight:600;padding:4px 0}
  .back svg{width:16px;height:16px}
  .meta{color:var(--muted);font-size:11.5px;margin-left:auto;text-align:right;line-height:1.3}
  main{max-width:1100px;margin:0 auto;padding:20px 16px 60px}

  /* ---- Menu de tarjetas ---- */
  .menu-h{margin:4px 2px 16px}
  .menu-h h1{margin:0 0 2px;font-size:20px}
  .menu-h p{margin:0;color:var(--muted)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
        padding:18px;text-align:left;display:flex;flex-direction:column;gap:10px;transition:.12s;min-height:130px}
  .card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 18px rgba(10,78,163,.12)}
  .card .ico{width:38px;height:38px;border-radius:10px;background:#eaf1fb;color:var(--primary);
             display:grid;place-items:center}
  .card .ico svg{width:21px;height:21px}
  .card h3{margin:0;font-size:15.5px}
  .card p{margin:0;color:var(--muted);font-size:12.5px;flex:1}
  .card .stat{font-size:11.5px;font-weight:700;color:var(--accent)}
  .card.soon{opacity:.72}
  .card.soon .ico{background:#f0f2f5;color:var(--muted)}
  .card .tag{font-size:10px;font-weight:700;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:1px 8px;align-self:flex-start}

  /* ---- Controles & tablas ---- */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  select,input[type=search]{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff}
  #moduleView input[type=text],#moduleView input[type=password]{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff;width:100%}
  #moduleView input[type=text]:focus,#moduleView input[type=password]:focus{outline:2px solid var(--primary);border-color:var(--primary)}
  input[type=search]{min-width:200px;flex:1}
  select:focus,input:focus{outline:2px solid var(--primary);border-color:var(--primary)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .seg button{padding:9px 14px;border:0;background:#fff;color:var(--muted);font-weight:600}
  .seg button.on{background:var(--primary);color:#fff}
  .btn{padding:9px 14px;border:1px solid var(--line);border-radius:8px;background:#fff;font-weight:600;color:var(--ink)}
  .btn:hover{border-color:var(--primary);color:var(--primary)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .chip{padding:6px 13px;border:1px solid var(--line);border-radius:99px;background:#fff;color:var(--muted);font-weight:600;font-size:12.5px}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .panel-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .panel-head h2{margin:0;font-size:15px}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:#eef2f8;color:var(--muted)}
  .pill.dist{background:var(--dist-bg);color:var(--dist)}

  table{width:100%;border-collapse:collapse}
  th,td{padding:9px 12px;text-align:left;border-bottom:1px solid #eef1f5;white-space:nowrap}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);
     background:#f7f9fc;position:sticky;top:0;cursor:pointer;user-select:none}
  th.r,td.r{text-align:right}
  tbody tr:hover{background:#f7faff}
  td.desc{white-space:normal;max-width:340px}
  td.cat{font-weight:600;color:var(--primary)}
  .stk{display:inline-block;padding:2px 9px;border-radius:99px;font-weight:700;font-variant-numeric:tabular-nums}
  .stk.ok{background:var(--ok-bg);color:var(--ok)} .stk.low{background:var(--low-bg);color:var(--low)}
  .stk.tras{background:#fdeee0;color:#b45309}
  .lote-badge{display:inline-block;margin-left:6px;padding:1px 8px;border-radius:99px;background:#fff3e0;color:#9a5a00;
              font-size:11px;font-weight:700;cursor:pointer;border:1px solid #f0d9b5;white-space:nowrap}
  .lote-badge:hover{background:#ffe7c2}
  .lotes-sub{width:100%;border-collapse:collapse}
  .lotes-sub th{background:#fff3e0;color:#9a5a00;font-size:10.5px;padding:5px 12px}
  .lotes-sub td{padding:4px 12px;border-bottom:1px solid #f3e6d3;font-size:12.5px}
  .lotes-sub td:first-child{padding-left:28px;font-family:ui-monospace,monospace}
  .scroll{max-height:62vh;overflow:auto}
  .area-tag{font-size:11px;color:var(--muted)}
  .empty{padding:40px 16px;text-align:center;color:var(--muted)}

  /* directorio */
  .dir-centro{padding:10px 16px;background:#f7f9fc;border-bottom:1px solid var(--line);font-weight:700;
              font-size:12px;color:var(--primary-d);display:flex;justify-content:space-between}
  .dir-centro span{color:var(--muted);font-weight:600}
  .alm-row{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid #eef1f5}
  .alm-key{font-family:ui-monospace,monospace;font-weight:700;background:#eef2f8;padding:2px 8px;border-radius:6px;min-width:54px;text-align:center}
  .alm-key.dist{background:var(--dist-bg);color:var(--dist)}
  .badge{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--accent);border:1px solid var(--accent);padding:1px 7px;border-radius:99px}

  /* config / soon */
  .cfg{display:grid;gap:14px;max-width:620px}
  .cfg .row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
  .cfg .row b{color:var(--muted);font-weight:600}
  .soon{padding:30px;text-align:center;color:var(--muted)}
  .soon h2{color:var(--ink);margin:0 0 8px}
  .soon ul{display:inline-block;text-align:left;margin:12px 0 0;line-height:1.7}

  /* ---- Tarjetas de área (Inventario) ---- */
  .area-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .area-card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
             box-shadow:var(--shadow);padding:18px 16px 40px;cursor:pointer;transition:.12s;text-align:left}
  .area-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 18px rgba(10,78,163,.12)}
  .area-card .ai{width:40px;height:40px;border-radius:10px;background:#eaf1fb;display:grid;place-items:center;font-size:21px;margin-bottom:10px}
  .area-card .an{font-size:15.5px;font-weight:700;margin-bottom:2px}
  .area-card .ae{font-size:12px;color:var(--muted)}
  .area-card.todo{background:linear-gradient(135deg,#f3f7fd,#eaf1fb)}
  .area-card.todo .ai{background:#e3ecfa}
  .area-card .exp{position:absolute;bottom:9px;right:10px;font-size:11px;font-weight:700;padding:3px 9px;
                  background:var(--primary);color:#fff;border:0;border-radius:7px}
  .area-card .exp:hover{background:var(--primary-d)}
  .area-card .cnt{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;color:var(--accent)}
  /* filtros checkbox */
  .chk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap}
  .chk input{width:15px;height:15px;accent-color:var(--primary)}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(15,27,45,.5);display:none;align-items:center;justify-content:center;z-index:120;padding:20px}
  .modal.on{display:flex}
  .modal-box{background:#fff;border-radius:14px;max-width:440px;width:100%;box-shadow:0 18px 50px rgba(0,0,0,.3);overflow:hidden}
  .modal-box h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);font-size:15px}
  .modal-body{padding:16px 18px;display:grid;gap:14px}
  .exp-areas{display:flex;flex-wrap:wrap;gap:7px}
  .exp-areas label{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;background:#f7f9fc;
                   border:1px solid var(--line);border-radius:8px;padding:5px 9px;cursor:pointer}
  .exp-opts{display:grid;gap:8px;border-top:1px solid var(--line);padding-top:12px}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--line);background:#f7f9fc}
  .btn-prim{padding:9px 16px;border:0;border-radius:8px;background:var(--primary);color:#fff;font-weight:700}
  .btn-prim:hover{background:var(--primary-d)}
  .linkish{background:none;border:0;color:var(--primary);font-weight:600;font-size:12.5px;text-decoration:underline}

  @media(max-width:560px){
    .meta{display:none}
    td.desc{max-width:170px}
    th,td{padding:8px 9px}
    .cards{grid-template-columns:1fr 1fr}
    .area-grid{grid-template-columns:1fr 1fr}
  }

  /* ---- Área de impresión (listas de conteo) ---- */
  #printArea{display:none}
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%}
    .pg{page-break-after:always;padding:0 4mm}
    .pg:last-child{page-break-after:auto}
  }
  #printArea .ph{border-bottom:2px solid #0a4ea3;padding-bottom:6px;margin-bottom:8px}
  #printArea .ph-top{font-size:11pt;font-weight:800;color:#073a7a}
  #printArea .ph-sub{font-size:8.5pt;color:#555}
  #printArea .ph-ubi{font-size:13pt;font-weight:800;margin-top:4px}
  #printArea .ph-meta{font-size:9pt;margin-top:4px;color:#222}
  #printArea .ph-meta u{text-decoration:none;border-bottom:1px solid #999;display:inline-block;min-width:120px}
  #printArea table.pt{width:100%;border-collapse:collapse;font-size:8.5pt}
  #printArea table.pt th{background:#0a4ea3;color:#fff;padding:4px 6px;text-align:left;font-size:8pt}
  #printArea table.pt td{border:1px solid #cbd5e1;padding:3px 6px}
  #printArea .col-fis{background:#fffbe9}
  #printArea .pf{display:flex;justify-content:space-between;font-size:7.5pt;color:#666;margin-top:6px}
</style>
</head>
<body>

<!-- ===== GATE ===== -->
<div id="gate">
  <div class="card">
    <h1>Almacén Distribuidor Puebla · <b>D041</b></h1>
    <p>Consulta de existencias por almacén. Ingresa la contraseña de acceso.</p>
    <label for="pass">Contraseña</label>
    <input type="password" id="pass" autocomplete="off" placeholder="........">
    <button id="enter">Entrar</button>
    <div class="err" id="gateErr"></div>
    <div class="alt">¿Sin conexión? <label for="filePick">Cargar datos.enc local</label>
      <input type="file" id="filePick" accept=".enc,.json" hidden></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" hidden>
  <header class="bar">
    <div class="bar-in">
      <button class="back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> Módulos</button>
      <div class="brand">Almacén Distribuidor Puebla · <b>D041</b></div>
      <div class="meta" id="meta"></div>
    </div>
  </header>
  <main>
    <section id="menuView"></section>
    <section id="moduleView" hidden></section>
  </main>
</div>

<!-- ===== MODAL EXPORTACIÓN MULTI-ÁREA ===== -->
<div class="modal" id="expModal">
  <div class="modal-box">
    <h3>Exportar inventario a Excel</h3>
    <div class="modal-body">
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px">Áreas
          <button class="linkish" id="expAll" style="float:right;text-transform:none;letter-spacing:0">Todas / ninguna</button></div>
        <div class="exp-areas" id="expAreas"></div>
      </div>
      <div class="exp-opts">
        <label class="chk"><input type="checkbox" id="expSoloExist"> Solo materiales con existencia</label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="expCancel">Cancelar</button>
      <button class="btn-prim" id="expGo">Descargar Excel</button>
    </div>
  </div>
</div>

<!-- ===== ÁREA DE IMPRESIÓN (listas de conteo) ===== -->
<div id="printArea"></div>

<script>
/* ============ CONFIG ============ */
const DATA_URL = "datos.enc";
const AREAS = ["Herramientas","Misceláneos","Papelería","Cables","Ropa y Calzado","Baja"];

/* ============ CRIPTO (Web Crypto, compatible con publicar.py) ============ */
const b64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function descifrar(sobre, clave){
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(clave), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(sobre.salt), iterations:sobre.iter, hash:sobre.hash},
    baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(sobre.iv)}, key, b64(sobre.ct));
  let bytes = new Uint8Array(buf);
  if(sobre.gzip){
    const ds = new DecompressionStream('gzip');
    const r = new Response(new Blob([bytes]).stream().pipeThrough(ds));
    bytes = new Uint8Array(await r.arrayBuffer());
  }
  return JSON.parse(new TextDecoder().decode(bytes));
}

/* ============ ESTADO ============ */
let DB = null, SOBRE = null;
const $ = s => document.querySelector(s);

/* ============ GATE ============ */
async function cargarSobre(){
  if(SOBRE) return SOBRE;
  const res = await fetch(DATA_URL, {cache:"no-store"});
  if(!res.ok) throw new Error("fetch");
  SOBRE = await res.json(); return SOBRE;
}
async function intentarEntrar(clave){
  const err = $("#gateErr"); err.textContent = "";
  if(!window.crypto || !window.crypto.subtle){
    err.innerHTML = "Este navegador bloquea el cifrado en páginas locales (file://).<br>Ábrela vía <b>http://localhost:8000</b> o desde GitHub Pages.";
    return;
  }
  try{
    const sobre = await cargarSobre();
    DB = await descifrar(sobre, clave);
    sessionStorage.setItem("tx41_pass", clave);
    arrancarApp();
  }catch(e){
    console.error("[TX41] Falló:", e);
    if(e.message==="fetch") err.textContent = "No se encontró datos.enc. Usa 'Cargar datos.enc local'.";
    else if(e.name==="OperationError" || e.name==="InvalidAccessError") err.textContent = "Contraseña incorrecta.";
    else err.textContent = "Error inesperado: "+e.name+(e.message? " — "+e.message:"");
  }
}
$("#enter").onclick = ()=> intentarEntrar($("#pass").value);
$("#pass").addEventListener("keydown", e=>{ if(e.key==="Enter") intentarEntrar($("#pass").value); });
$("#filePick").addEventListener("change", async e=>{
  const f = e.target.files[0]; if(!f) return;
  SOBRE = JSON.parse(await f.text());
  $("#gateErr").textContent = "Archivo cargado. Ingresa la contraseña.";
});
window.addEventListener("DOMContentLoaded", ()=>{
  const saved = sessionStorage.getItem("tx41_pass");
  if(saved) intentarEntrar(saved);
  $("#pass").focus();
});

/* ============ APP / ROUTER ============ */
function arrancarApp(){
  $("#gate").hidden = true; $("#app").hidden = false;
  try{
    const m = DB.meta;
    $("#meta").innerHTML = `Generado ${new Date(m.generado).toLocaleString('es-MX')}<br>`+
      `${m.n_materiales.toLocaleString('es-MX')} materiales · ${m.n_almacenes} almacenes`;
    $("#backBtn").onclick = mostrarMenu;
    mostrarMenu();
  }catch(e){
    $("#gate").hidden=false; $("#app").hidden=true;
    $("#gateErr").textContent = "Error al mostrar datos: "+e.name+" — "+e.message;
  }
}
function mostrarMenu(){
  invSel=null;
  $("#backBtn").style.display="none";
  $("#moduleView").hidden=true; $("#menuView").hidden=false;
  renderMenu();
}
function abrirModulo(id){
  $("#backBtn").style.display="inline-flex";
  $("#backBtn").onclick=mostrarMenu;
  $("#menuView").hidden=true; $("#moduleView").hidden=false;
  window.scrollTo(0,0);
  ({inventario:modInventario, analisis:modAnalisis, directorio:modDirectorio, or:modOR, config:modConfig}[id])();
}

/* ============ HELPERS DE DATOS ============ */
const almList = ()=> Object.values(DB.directorio.almacenes);
const almName = k => (DB.directorio.almacenes[k]?.desc)||k;
const mat = c => DB.materiales[c] || {desc:"",um:"",area:"",ubic:""};
const DIST = ()=> DB.meta.almacen_distribuidor;
function almacenesConExistencia(){ const s=new Set(); for(const e of Object.values(DB.existencias)) for(const k in e) s.add(k); return s; }
function stkClass(n){ return n<=0?"":(n<5?"low":"ok"); }
function nfmt(n){ return n.toLocaleString('es-MX'); }
function descargarXLSX(aoa, hoja, nombre){
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), hoja);
  XLSX.writeFile(wb, nombre+".xlsx");
}

/* ============ MENÚ ============ */
const ICONS={
  inventario:'<path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/>',
  analisis:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>',
  directorio:'<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/>',
  or:'<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/>',
  config:'<circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1z"/>'
};
function renderMenu(){
  const conEx=almacenesConExistencia();
  const nDist = Object.values(DB.existencias).filter(e=>DIST() in e).length;
  const nRec = almList().filter(a=>a.recurrente).length;
  const cards=[

/* ============ INVENTARIO (D041 por área, con tarjetas) ============ */
const AREA_ICON={Herramientas:"🔧",Misceláneos:"🔩",Papelería:"📄",Cables:"🔌","Ropa y Calzado":"👔",Baja:"📦"};
const TODO="__TODO__";
let invSel=null, invSort={col:"exist",dir:-1};

// existencia del distribuidor para un catálogo (null si no aparece)
function existDist(cat){ const e=DB.existencias[cat]; return e && DIST() in e ? e[DIST()] : null; }
// traslado del distribuidor (0 si no hay)
function trasDist(cat){ const t=DB.traslados&&DB.traslados[cat]; return t && DIST() in t ? t[DIST()] : 0; }
// lotes reales del distribuidor (lista, vacío si no hay)
function lotesDe(cat){ return (DB.lotes&&DB.lotes[cat])||[]; }

// Construye filas desde el MAESTRO para un área (o TODO). Incluye materiales sin existencia (exist=null).
function matsArea(area){
  const out=[];
  for(const [cat,m] of Object.entries(DB.materiales)){
    if(area!==TODO && (m.area||"")!==area) continue;
    out.push({cat,desc:m.desc||"",um:m.um||"",area:m.area||"Sin clasificar",ubic:m.ubic||"",
              exist:existDist(cat),tras:trasDist(cat),lotes:lotesDe(cat)});
  }
  return out;
}

function modInventario(){
  if(invSel===null) return renderAreasInv();
  return renderDetalleInv();
}

// aplica los filtros del detalle a las filas del área actual
function filasInv(){
  const q=($("#invSearch")?.value||"").trim().toLowerCase();
  const ceros=$("#invCeros")?.checked;
  const soloTras=$("#invTras")?.checked;
  const ubiSel=$("#invUbi")?.value||"";
  const areaSel=$("#invArea")?.value||"";
  let rows=matsArea(invSel).filter(m=>{
    if(q && !(m.cat.toLowerCase().includes(q)||m.desc.toLowerCase().includes(q))) return false;
    if(ubiSel && m.ubic!==ubiSel) return false;
    if(areaSel && m.area!==areaSel) return false;
    if(ceros && !(m.exist!==null && m.exist>0)) return false;
    if(soloTras && !(m.tras>0)) return false;
    return true;
  });
  rows.sort((a,b)=>{const c=invSort.col,k=invSort.dir;
    if(c==="exist") return ((a.exist??-1)-(b.exist??-1))*k;
    if(c==="tras") return ((a.tras||0)-(b.tras||0))*k;
    return String(a[c]||"").localeCompare(String(b[c]||""))*k;});
  return rows;
}
function pintarInv(){
  const esTodo=invSel===TODO, rows=filasInv();
  const conx=rows.filter(r=>r.exist!==null&&r.exist>0).length;
  $("#invCount").textContent=`${nfmt(rows.length)} materiales · ${nfmt(conx)} con existencia`;
  const cols=esTodo
    ? `<th data-c="cat">Catálogo</th><th data-c="desc">Descripción</th><th data-c="area">Área</th><th data-c="ubic">Ubicación</th><th data-c="exist" class="r">Existencia</th><th data-c="tras" class="r">Traslado</th>`
    : `<th data-c="cat">Catálogo</th><th data-c="desc">Descripción</th><th data-c="um">U.M.</th><th data-c="ubic">Ubicación</th><th data-c="exist" class="r">Existencia</th><th data-c="tras" class="r">Traslado</th>`;
  const ncols = esTodo?6:6;
  $("#invTable").innerHTML=`<thead><tr>${cols}</tr></thead><tbody>${
    rows.length? rows.map(r=>{
      const ex = r.exist===null ? `<span style="color:var(--zero);font-style:italic">—</span>`
                : `<span class="stk ${stkClass(r.exist)}">${nfmt(r.exist)}</span>`;
      const tr = r.tras>0 ? `<span class="stk tras">${nfmt(r.tras)}</span>` : `<span style="color:var(--zero)">—</span>`;
      const tieneLotes = r.lotes && r.lotes.length>0;
      const badge = tieneLotes ? ` <span class="lote-badge" data-lt="${r.cat}">📦 ${r.lotes.length} lote${r.lotes.length>1?'s':''}</span>` : "";
      const main = esTodo
        ? `<tr><td class="cat num">${r.cat}</td><td class="desc">${r.desc||"—"}${badge}</td>
             <td><span class="area-tag">${r.area||"—"}</span></td><td>${r.ubic||"—"}</td>
             <td class="r">${ex} <small style="color:var(--muted)">${r.um}</small></td><td class="r">${tr}</td></tr>`
        : `<tr><td class="cat num">${r.cat}</td><td class="desc">${r.desc||"—"}${badge}</td>
             <td>${r.um||"—"}</td><td>${r.ubic||"—"}</td>
             <td class="r">${ex} <small style="color:var(--muted)">${r.um}</small></td><td class="r">${tr}</td></tr>`;
      const filaLotes = tieneLotes
        ? `<tr class="lotes-row" id="lt-${r.cat}" hidden><td colspan="${ncols}" style="padding:0;background:#fffaf2">
             <table class="lotes-sub"><thead><tr><th>Lote</th><th class="r">Libre</th><th class="r">Traslado</th></tr></thead>
             <tbody>${r.lotes.map(l=>`<tr><td class="num">${l.lote}</td><td class="r num">${nfmt(l.lib)}</td>
               <td class="r num" style="color:var(--low)">${nfmt(l.tras||0)}</td></tr>`).join("")}</tbody></table></td></tr>`
        : "";
      return main+filaLotes;
    }).join("") : `<tr><td colspan="6" class="empty">Sin coincidencias.</td></tr>`}</tbody>`;
  $("#invTable").querySelectorAll("th[data-c]").forEach(th=> th.onclick=()=>{
    const c=th.dataset.c; invSort={col:c,dir:invSort.col===c?-invSort.dir:(c==="exist"||c==="tras"?-1:1)}; pintarInv(); });
  $("#invTable").querySelectorAll(".lote-badge").forEach(b=> b.onclick=()=>{
    const row=document.getElementById("lt-"+b.dataset.lt); if(row) row.hidden=!row.hidden; });
}

/* ---- Exportaciones de Inventario ---- */
function fechaTag(){ return new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-'); }
function expFilas(mats){
  const aoa=[["Área","Catálogo","Descripción","U.M.","Ubicación","Existencia D041","Traslado","Lote"]];
  mats.forEach(m=>{
    aoa.push([m.area,m.cat,m.desc,m.um,m.ubic, m.exist===null?"":m.exist, m.tras||0, ""]);
    if(m.lotes && m.lotes.length){
      m.lotes.forEach(l=> aoa.push(["","  ↳ lote","","","", l.lib, l.tras||0, l.lote]));
    }
  });
  return aoa;
}

// export directo de un área (desde la tarjeta)
function exportarArea(area,soloExist){
  let mats=matsArea(area); if(soloExist) mats=mats.filter(m=>m.exist!==null&&m.exist>0);
  if(!mats.length){ alert("No hay materiales para exportar en "+area); return; }
  mats.sort((a,b)=>(b.exist??-1)-(a.exist??-1));
  descargarXLSX(expFilas(mats), (area===TODO?"Todo":area).substring(0,28), `Inventario_${area===TODO?"Todo":area.replace(/ /g,"_")}_${fechaTag()}`);
}
// export del detalle respetando filtros actuales
function exportarFiltrado(){
  const mats=filasInv(); if(!mats.length){ alert("No hay materiales con los filtros actuales."); return; }
  const nom=invSel===TODO?"Todo":invSel.replace(/ /g,"_");
  descargarXLSX(expFilas(mats), (invSel===TODO?"Todo":invSel).substring(0,28), `Inventario_${nom}_${fechaTag()}`);
}

function abrirModalExp(){
  $("#expAreas").innerHTML=AREAS.map(a=>`<label><input type="checkbox" data-a="${a}" checked> ${a}</label>`).join("");
  $("#expSoloExist").checked=true;
  $("#expModal").classList.add("on");
}
function cerrarModalExp(){ $("#expModal").classList.remove("on"); }
$("#expCancel").onclick=cerrarModalExp;
$("#expAll").onclick=()=>{ const cbs=$("#expAreas").querySelectorAll("input"); const any=[...cbs].some(c=>!c.checked); cbs.forEach(c=>c.checked=any); };
$("#expGo").onclick=()=>{
  const sel=[...$("#expAreas").querySelectorAll("input:checked")].map(c=>c.dataset.a);
  if(!sel.length){ alert("Selecciona al menos un área."); return; }
  const soloExist=$("#expSoloExist").checked;
  let mats=[]; sel.forEach(a=>{ mats=mats.concat(matsArea(a)); });
  if(soloExist) mats=mats.filter(m=>m.exist!==null&&m.exist>0);
  if(!mats.length){ alert("No hay materiales con esos criterios."); return; }
  mats.sort((a,b)=> a.area===b.area ? (b.exist??-1)-(a.exist??-1) : a.area.localeCompare(b.area));
  const nom=sel.length===AREAS.length?"Todo":sel.join("_").substring(0,28);
  descargarXLSX(expFilas(mats), "Inventario", `Inventario_${nom}_${fechaTag()}`);
  cerrarModalExp();
};

/* ============ ANÁLISIS (por almacén / por catálogo) ============ */
let anView="almacen", anSort={col:"exist",dir:-1};
function modAnalisis(){
  const conEx=almacenesConExistencia(), porCentro={};
  almList().filter(a=>conEx.has(a.clave)).forEach(a=> (porCentro[a.centro_desc||a.centro] ||= []).push(a));

      const dist=a.clave===DIST()?" — Distribuidor":""; return `<option value="${a.clave}">${a.clave} · ${a.desc}${dist}</option>`;}).join("")
  }</optgroup>`).join("");
  $("#moduleView").innerHTML=`
    <div class="controls">
      <div class="seg" id="anSeg"><button data-v="almacen" class="on">Por almacén</button><button data-v="catalogo">Por catálogo</button></div>
      <span id="anSelWrap"><select id="anAlm">${optg}</select></span>

      <button class="btn" id="anExport">Exportar Excel</button>
    </div>
    <div class="panel"><div class="panel-head"><h2 id="anTitle"></h2><span class="pill" id="anCount"></span></div>
      <div class="scroll"><table id="anTable"></table></div></div>`;
  const sel=$("#anAlm");
  if([...sel.options].some(o=>o.value===DIST())) sel.value=DIST();
  $("#anSeg").querySelectorAll("button").forEach(b=> b.onclick=()=>{ anView=b.dataset.v;
    $("#anSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
    $("#anSelWrap").style.display=anView==="almacen"?"":"none";
    $("#anSearch").placeholder=anView==="almacen"?"Buscar catálogo o descripción…":"Escribe un catálogo exacto…"; pintarAn(); });
  sel.onchange=pintarAn; $("#anSearch").oninput=pintarAn; $("#anExport").onclick=exportarAn;
  pintarAn();
}
function filasAn(){
  const q=$("#anSearch").value.trim().toLowerCase();
  if(anView==="almacen"){
    const alm=$("#anAlm").value; let rows=[];
    for(const [cat,e] of Object.entries(DB.existencias)){
      if(!(alm in e)) continue; const m=mat(cat);
      if(q && !(cat.toLowerCase().includes(q)||m.desc.toLowerCase().includes(q))) continue;
      rows.push({cat,desc:m.desc,um:m.um,area:m.area,ubic:m.ubic,exist:e[alm]});
    } return rows;
  } else {
    const qx=$("#anSearch").value.trim(); let rows=[];
    if(qx){ const e=DB.existencias[qx]||{}; for(const [alm,qty] of Object.entries(e)) rows.push({alm,nombre:almName(alm),exist:qty}); }
    return rows;
  }
}
function pintarAn(){
  const tbl=$("#anTable");
  if(anView==="almacen"){
    const alm=$("#anAlm").value, isD=alm===DIST(), rows=filasAn();
    rows.sort((a,b)=>{const c=anSort.col,k=anSort.dir; return c==="exist"?(a.exist-b.exist)*k:String(a[c]||"").localeCompare(String(b[c]||""))*k;});
    $("#anTitle").innerHTML=`${alm} · ${almName(alm)} `+(isD?`<span class="pill dist">DISTRIBUIDOR</span>`:"");
    $("#anCount").textContent=`${rows.length} materiales`;
    tbl.innerHTML=`<thead><tr><th data-c="cat">Catálogo</th><th data-c="desc">Descripción</th>
      <th data-c="area">Área</th><th data-c="ubic">Ubicación</th><th data-c="exist" class="r">Existencia</th></tr></thead><tbody>${
      rows.length? rows.map(r=>`<tr><td class="cat num">${r.cat}</td><td class="desc">${r.desc||"—"}</td>
        <td><span class="area-tag">${r.area||"—"}</span></td><td>${r.ubic||"—"}</td>
        <td class="r"><span class="stk ${stkClass(r.exist)}">${nfmt(r.exist)}</span> <small style="color:var(--muted)">${r.um}</small></td></tr>`).join("")
        : `<tr><td colspan="5" class="empty">Sin coincidencias.</td></tr>`}</tbody>`;
    tbl.querySelectorAll("th[data-c]").forEach(th=> th.onclick=()=>{ const c=th.dataset.c;
      anSort={col:c,dir:anSort.col===c?-anSort.dir:(c==="exist"?-1:1)}; pintarAn(); });
  } else {
    const qx=$("#anSearch").value.trim(), rows=filasAn().sort((a,b)=>b.exist-a.exist);
    $("#anTitle").textContent=qx?`Catálogo ${qx}`:"Por catálogo";
    $("#anCount").textContent=qx?(mat(qx).desc||""):"";
    tbl.innerHTML=`<thead><tr><th>Almacén</th><th>Nombre</th><th class="r">Existencia</th></tr></thead><tbody>${

function calcularOR(){
  const D=DIST(), cons=DB.consumos[orAlm]||{}, m=orParams.mesesCPM, ms=orParams.mesesStock, out=[];
  for(const [cat,consumo] of Object.entries(cons)){
    const info=mat(cat);
    const cpm=consumo/m;
    const exAux=(DB.existencias[cat]&&DB.existencias[cat][orAlm])||0;
    const exD=(DB.existencias[cat]&&DB.existencias[cat][D])||0;
    const calcSurtir=ms*cpm-exAux;
    const surtir=Math.max(0,Math.round(calcSurtir));
    const mdInv=cpm>0?exAux/cpm:null;
    const excedente=(3*cpm-exAux)<0;
    out.push({cat,desc:info.desc,um:info.um,area:info.area,consumo,cpm,exAux,exD,calcSurtir,surtir,mdInv,excedente,
              xsurtir:Math.min(surtir,exD)});
  }
  return out;
}
function filasOR(){
  const q=($("#orSearch")?.value||"").trim().toLowerCase(), solo=$("#orSolo")?.checked;
  let rows=calcularOR().filter(r=>{
    if(q && !(r.cat.toLowerCase().includes(q)||(r.desc||"").toLowerCase().includes(q))) return false;
    if(solo && !(r.calcSurtir>0.5)) return false;
    return true;
  });
  const k=orSort.dir,c=orSort.col, numCol=["consumo","cpm","exAux","exD","calcSurtir","surtir"].includes(c);
  rows.sort((a,b)=> numCol?((a[c]||0)-(b[c]||0))*k:String(a[c]||"").localeCompare(String(b[c]||""))*k);
  return rows;
}

/* ---- Parser de consumos (TSV de SAP o xlsx) ---- */
function claveDeNombre(nombre){
  const base=nombre.replace(/\.[^.]+$/,"").trim().toUpperCase();
  return /^TX/.test(base) ? "A0"+base.slice(2) : base;
}
async function parseConsumoFile(file){
  const alm=claveDeNombre(file.name);
  const buf=await file.arrayBuffer(); const bytes=new Uint8Array(buf);
  let mapa={};
  if(bytes[0]===0x50 && bytes[1]===0x4B){ // xlsx (zip)
    const wb=XLSX.read(buf,{type:"array"}); const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
    rows.forEach(r=>{ const cat=_txtJS(r[1]); if(/^\d+$/.test(cat)) mapa[cat]=_numJS(r[2]); });
  } else { // texto TSV
    const txt=new TextDecoder("iso-8859-1").decode(buf);
    txt.split(/\r?\n/).forEach(ln=>{ const p=ln.split("\t"); if(p.length<3) return;
      const cat=_txtJS(p[1]); if(/^\d+$/.test(cat)) mapa[cat]=_numJS(p[2]); });
  }
  if(!Object.keys(mapa).length) throw new Error("sin filas válidas (revisa columnas B y C)");
  return {alm, mapa, n:Object.keys(mapa).length};
}

/* ---- Parser del TOTAL en el navegador (replica parser_total.py) ---- */
function _txtJS(v){ return v===null||v===undefined?"":String(v).trim(); }
function _numJS(v){ if(v===null||v===undefined) return 0; const s=String(v).trim().replace(/,/g,""); if(!s) return 0; const f=parseFloat(s); return isNaN(f)?0:f; }
function parseTotalJS(arrayBuffer){
  const wb=XLSX.read(arrayBuffer,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
  let hr=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){ if(rows[i].some(c=>_txtJS(c).toLowerCase()==="material")){ hr=i; break; } }
  if(hr<0) throw new Error("No se encontró la fila de encabezados (columna 'Material').");
  const H=rows[hr]; const col={};
  H.forEach((h,i)=>{ h=_txtJS(h).toLowerCase();
    if(h==="ce."||h.startsWith("centro")) col.centro=i;
    else if(h==="alm."||h.startsWith("almac")) col.almacen=i;
    else if(h==="material") col.material=i;
    else if(h.includes("texto breve")) col.desc=i;
    else if(h==="umb") col.umb=i;
    else if(h==="lote") col.lote=i;
    else if(h.startsWith("librutiliz")||h.includes("libre")) col.libre=i;
    else if(h.startsWith("transytras")||h.includes("traslad")||h.includes("transy")) col.tras=i;
  });
  ["centro","almacen","material","libre"].forEach(k=>{ if(!(k in col)) throw new Error("Falta columna: "+k); });
  const D="D041"; const materiales={}; const almacenes={};
  for(let i=hr+1;i<rows.length;i++){
    const r=rows[i]; if(!r) continue;
    const ce=_txtJS(r[col.centro]), alm=_txtJS(r[col.almacen]), cat=_txtJS(r[col.material]);
    if(!(ce||alm||cat)) continue; if(!(cat&&alm)) continue;
    const libre=_numJS(r[col.libre]); const tras="tras"in col?_numJS(r[col.tras]):0;
    const lote="lote"in col?_txtJS(r[col.lote]):""; const desc="desc"in col?_txtJS(r[col.desc]):""; const umb="umb"in col?_txtJS(r[col.umb]):"";
    almacenes[alm]=ce;
    let m=materiales[cat]; if(!m){ m=materiales[cat]={desc:"",umb:"",almacenes:{},traslados:{},lotes:{}}; }
    if(desc&&!m.desc) m.desc=desc; if(umb&&!m.umb) m.umb=umb;
    const loteReal=lote&&lote.toUpperCase()!=="NUEVO";
    if(loteReal){ (m.lotes[alm]||(m.lotes[alm]=[])).push({lote,lib:libre,tras}); }
    m.almacenes[alm]=(m.almacenes[alm]||0)+libre;
    if(tras) m.traslados[alm]=(m.traslados[alm]||0)+tras;
  }
  return {materiales,almacenes,D,
    nAlmacenes:Object.keys(almacenes).length,
    nTraslados:Object.values(materiales).filter(m=>m.traslados[D]).length,
    nLotesD041:Object.values(materiales).filter(m=>m.lotes[D]).length};
}
function construirBundleJS(parsed){
  const D=parsed.D;
  const materiales={}; for(const [c,v] of Object.entries(DB.materiales)) materiales[c]={...v};
  for(const [cat,m] of Object.entries(parsed.materiales)){
    if(!materiales[cat]) materiales[cat]={um:m.umb,desc:m.desc,area:"",ubic:""};
    else { if(!materiales[cat].desc) materiales[cat].desc=m.desc; if(!materiales[cat].um) materiales[cat].um=m.umb; }
  }
  const existencias={}, traslados={}, lotes={}, valoracion=[];
  for(const [cat,m] of Object.entries(parsed.materiales)){
    const ex={}; for(const[a,v]of Object.entries(m.almacenes)) if(v>0) ex[a]=v;
    if(Object.keys(ex).length) existencias[cat]=ex;
    if(Object.keys(m.traslados).length) traslados[cat]=m.traslados;
    if(m.lotes[D]&&m.lotes[D].length) lotes[cat]=m.lotes[D];
    if(Object.keys(m.lotes).length) valoracion.push(cat);
  }
  valoracion.sort();
  const out={ meta:{ generado:new Date().toISOString().slice(0,19), almacen_distribuidor:D,
      n_materiales:Object.keys(materiales).length, n_almacenes:Object.keys(DB.directorio.almacenes).length,
      n_con_existencia:Object.keys(existencias).length },
    directorio:DB.directorio, materiales, existencias, traslados, lotes, valoracion };
  if(DB.consumos) out.consumos=DB.consumos; // conservar consumos existentes
  return out;
}
/* ---- Cifrado en navegador (replica publicar.py) ---- */
const _b64enc = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
async function _gzip(bytes){
  const cs=new CompressionStream("gzip");
  const r=new Response(new Blob([bytes]).stream().pipeThrough(cs));
  return new Uint8Array(await r.arrayBuffer());
}
async function cifrarJS(bundle, clave){
  const plano=new TextEncoder().encode(JSON.stringify(bundle));
  const comp=await _gzip(plano);
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const iter=200000;
  const baseKey=await crypto.subtle.importKey("raw", new TextEncoder().encode(clave), "PBKDF2", false, ["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"}, baseKey,
    {name:"AES-GCM",length:256}, false, ["encrypt"]);
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, comp);
  return { v:1, alg:"AES-GCM", kdf:"PBKDF2", hash:"SHA-256", iter, gzip:true,
    salt:_b64enc(salt), iv:_b64enc(iv), ct:_b64enc(ct) };
}
async function publicarGitHub(){
  const st=$("#ghStatus");
  const repo=$("#ghRepo").value.trim(), path=$("#ghPath").value.trim(), token=$("#ghToken").value.trim();
  if(!repo||!path||!token){ st.style.color="#c0392b"; st.textContent="Faltan repo, ruta o token."; return; }
  const api=`https://api.github.com/repos/${repo}/contents/${path}`;
  const headers={ "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json" };
  st.style.color="var(--muted)"; st.textContent="Cifrando y publicando…";
  try{
    const clave=sessionStorage.getItem("tx41_pass")||"";
    const sobre=await cifrarJS(bundleFinal(), clave);
    let sha=null; const g=await fetch(api,{headers}); if(g.ok){ sha=(await g.json()).sha; }
    const body={ message:"Actualización "+new Date().toLocaleString('es-MX'), content:btoa(JSON.stringify(sobre)) };
    if(sha) body.sha=sha;
    const p=await fetch(api,{method:"PUT",headers,body:JSON.stringify(body)});
    if(p.ok){ st.style.color="var(--ok)"; st.textContent="✅ Publicado. Puede tardar ~1 min en GitHub Pages."; }
    else { const e=await p.json(); st.style.color="#c0392b"; st.textContent="Error "+p.status+": "+(e.message||""); }
  }catch(err){ st.style.color="#c0392b"; st.textContent="Error: "+err.message; }
}
