<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén Distribuidor Puebla · D041</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#eef2f6; --surface:#fff; --line:#dde4ec;
    --ink:#0f1b2d; --muted:#5b6b80;
    --primary:#0a4ea3; --primary-d:#073a7a; --accent:#00a3b4;
    --ok:#1a7f4b; --ok-bg:#e7f4ec; --low:#b45309; --low-bg:#fbf0df; --zero:#94a3b4;
    --dist:#b8860b; --dist-bg:#fdf6e3;
    --radius:12px; --shadow:0 1px 3px rgba(15,27,45,.08),0 1px 2px rgba(15,27,45,.04);
  }
  *{box-sizing:border-box}
  [hidden]{display:none !important}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  .num{font-variant-numeric:tabular-nums}
  button{font:inherit;cursor:pointer}

  /* ---- Gate ---- */
  #gate{position:fixed;inset:0;display:grid;place-items:center;
        background:linear-gradient(135deg,#073a7a,#0a4ea3 60%,#0c63c9);z-index:50;padding:20px}
  #gate .card{background:var(--surface);border-radius:14px;padding:28px;max-width:360px;width:100%;
              box-shadow:0 18px 50px rgba(0,0,0,.3)}
  #gate h1{margin:0 0 4px;font-size:19px}
  #gate p{margin:0 0 18px;color:var(--muted);font-size:13px}
  #gate label{display:block;font-weight:600;font-size:12px;margin-bottom:6px;color:var(--muted)}
  #gate input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font:inherit}
  #gate input:focus{outline:2px solid var(--primary);border-color:var(--primary)}
  #gate button{width:100%;margin-top:14px;padding:11px;background:var(--primary);color:#fff;border:0;
               border-radius:8px;font-weight:600}
  #gate button:hover{background:var(--primary-d)}
  #gate .err{color:#c0392b;font-size:13px;margin-top:10px;min-height:18px}
  #gate .alt{margin-top:14px;text-align:center;font-size:12px;color:var(--muted)}
  #gate .alt label{display:inline;color:var(--primary);cursor:pointer;text-decoration:underline;font-weight:600}

  /* ---- Shell ---- */
  header.bar{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .bar-in{max-width:1100px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  main.fullwidth ~ nav .bar-in, .fullwidth-bar .bar-in{max-width:none;padding-left:12px;padding-right:12px}
  .brand{font-weight:700;font-size:15px;letter-spacing:.2px}
  .brand b{color:var(--primary)}
  .back{display:none;align-items:center;gap:6px;background:none;border:0;color:var(--primary);font-weight:600;padding:4px 0}
  .back svg{width:16px;height:16px}
  .meta{color:var(--muted);font-size:11.5px;margin-left:auto;text-align:right;line-height:1.3}
  main{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
  main.fullwidth{max-width:none;padding-left:12px;padding-right:12px}

  /* ---- Menu de tarjetas ---- */
  .menu-h{margin:4px 2px 16px}
  .menu-h h1{margin:0 0 2px;font-size:20px}
  .menu-h p{margin:0;color:var(--muted)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
        padding:18px;text-align:left;display:flex;flex-direction:column;gap:10px;transition:.12s;min-height:130px}
  .card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 18px rgba(10,78,163,.12)}
  .card .ico{width:38px;height:38px;border-radius:10px;background:#eaf1fb;color:var(--primary);
             display:grid;place-items:center}
  .card .ico svg{width:21px;height:21px}
  .card h3{margin:0;font-size:15.5px}
  .card p{margin:0;color:var(--muted);font-size:12.5px;flex:1}
  .card .stat{font-size:11.5px;font-weight:700;color:var(--accent)}
  .card.soon{opacity:.72}
  .card.soon .ico{background:#f0f2f5;color:var(--muted)}
  .card .tag{font-size:10px;font-weight:700;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:1px 8px;align-self:flex-start}

  /* ---- Controles & tablas ---- */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  select,input[type=search]{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff}
  #moduleView input[type=text],#moduleView input[type=password]{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff;width:100%}
  #moduleView input[type=text]:focus,#moduleView input[type=password]:focus{outline:2px solid var(--primary);border-color:var(--primary)}
  input[type=search]{min-width:200px;flex:1}
  select:focus,input:focus{outline:2px solid var(--primary);border-color:var(--primary)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .seg button{padding:9px 14px;border:0;background:#fff;color:var(--muted);font-weight:600}
  .seg button.on{background:var(--primary);color:#fff}
  .btn{padding:9px 14px;border:1px solid var(--line);border-radius:8px;background:#fff;font-weight:600;color:var(--ink)}
  .btn:hover{border-color:var(--primary);color:var(--primary)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .chip{padding:6px 13px;border:1px solid var(--line);border-radius:99px;background:#fff;color:var(--muted);font-weight:600;font-size:12.5px}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .panel-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .panel-head h2{margin:0;font-size:15px}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:#eef2f8;color:var(--muted)}
  .pill.dist{background:var(--dist-bg);color:var(--dist)}

  table{width:100%;border-collapse:collapse}
  th,td{padding:9px 12px;text-align:left;border-bottom:1px solid #eef1f5;white-space:nowrap}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);
     background:#f7f9fc;position:sticky;top:0;cursor:pointer;user-select:none}
  th.r,td.r{text-align:right}
  tbody tr:hover{background:#f7faff}
  td.desc{white-space:normal;max-width:340px}
  td.cat{font-weight:600;color:var(--primary)}
  .stk{display:inline-block;padding:2px 9px;border-radius:99px;font-weight:700;font-variant-numeric:tabular-nums}
  .stk.ok{background:var(--ok-bg);color:var(--ok)} .stk.low{background:var(--low-bg);color:var(--low)}
  .stk.tras{background:#fdeee0;color:#b45309}
  .lote-badge{display:inline-block;margin-left:6px;padding:1px 8px;border-radius:99px;background:#fff3e0;color:#9a5a00;
              font-size:11px;font-weight:700;cursor:pointer;border:1px solid #f0d9b5;white-space:nowrap}
  .lote-badge:hover{background:#ffe7c2}
  .lotes-sub{width:100%;border-collapse:collapse}
  .lotes-sub th{background:#fff3e0;color:#9a5a00;font-size:10.5px;padding:5px 12px}
  .lotes-sub td{padding:4px 12px;border-bottom:1px solid #f3e6d3;font-size:12.5px}
  .lotes-sub td:first-child{padding-left:28px;font-family:ui-monospace,monospace}
  .scroll{max-height:62vh;overflow:auto}
  .area-tag{font-size:11px;color:var(--muted)}
  .empty{padding:40px 16px;text-align:center;color:var(--muted)}

  /* directorio */
  .dir-centro{padding:10px 16px;background:#f7f9fc;border-bottom:1px solid var(--line);font-weight:700;
              font-size:12px;color:var(--primary-d);display:flex;justify-content:space-between}
  .dir-centro span{color:var(--muted);font-weight:600}
  .alm-row{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid #eef1f5}
  .alm-key{font-family:ui-monospace,monospace;font-weight:700;background:#eef2f8;padding:2px 8px;border-radius:6px;min-width:54px;text-align:center}
  .alm-key.dist{background:var(--dist-bg);color:var(--dist)}
  .badge{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--accent);border:1px solid var(--accent);padding:1px 7px;border-radius:99px}

  /* config / soon */
  .cfg{display:grid;gap:14px;max-width:620px}
  .cfg .row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
  .cfg .row b{color:var(--muted);font-weight:600}
  .soon{padding:30px;text-align:center;color:var(--muted)}
  .soon h2{color:var(--ink);margin:0 0 8px}
  .soon ul{display:inline-block;text-align:left;margin:12px 0 0;line-height:1.7}

  .ng-arrow{transition:transform .2s;display:inline-block}
  details[open] .ng-arrow{transform:rotate(180deg)}
  details summary::-webkit-details-marker{display:none}
  details summary{outline:none}
  .an-cat-wrap{position:relative}
  .fijadas-bar{background:#eaf1fb;border:1px solid #b8d0f0;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:none}
  .fijadas-bar.on{display:block}
  .fijadas-bar h4{margin:0 0 8px;font-size:13px;color:var(--primary);display:flex;align-items:center;gap:8px}
  .fijadas-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .fijada-chip{background:#fff;border:1px solid #b8d0f0;border-radius:8px;padding:3px 10px;font-size:12px;display:flex;align-items:center;gap:6px}
  .fijada-chip button{background:none;border:none;color:#c0392b;cursor:pointer;font-size:14px;line-height:1;padding:0}
  .an-cat-input{width:100%;padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;font:inherit;font-size:14px}
  .an-cat-input:focus{border-color:var(--primary);outline:none}
  .an-cat-sugs{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--line);border-radius:8px;z-index:300;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1);margin-top:2px;display:none}
  .an-cat-sug{padding:8px 12px;cursor:pointer;font-size:12.5px;border-bottom:1px solid #f1f5f9}
  .an-cat-sug:hover{background:#eaf1fb}
  .an-desc{font-size:13px;padding:4px 2px;color:var(--muted);min-height:20px}
  .an-desc.ok{color:var(--primary);font-weight:600}
  .an-alm-code{font-weight:700;color:var(--primary);font-size:12px}
  .an-alm-name{font-size:11px;color:var(--muted)}
  .an-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
  .an-badge.v{background:#d1fae5;color:#065f46}
  .an-badge.a{background:#fef3c7;color:#92400e}
  .an-badge.r{background:#fde8e8;color:#991b1b}
  .an-badge.g{background:#f1f5f9;color:var(--muted)}
  .area-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .area-card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
             box-shadow:var(--shadow);padding:18px 16px 40px;cursor:pointer;transition:.12s;text-align:left}
  .area-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 18px rgba(10,78,163,.12)}
  .area-card .ai{width:40px;height:40px;border-radius:10px;background:#eaf1fb;display:grid;place-items:center;font-size:21px;margin-bottom:10px}
  .area-card .an{font-size:15.5px;font-weight:700;margin-bottom:2px}
  .area-card .ae{font-size:12px;color:var(--muted)}
  .area-card.todo{background:linear-gradient(135deg,#f3f7fd,#eaf1fb)}
  .area-card.todo .ai{background:#e3ecfa}
  .area-card .exp{position:absolute;bottom:9px;right:10px;font-size:11px;font-weight:700;padding:3px 9px;
                  background:var(--primary);color:#fff;border:0;border-radius:7px}
  .area-card .exp:hover{background:var(--primary-d)}
  .area-card .cnt{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;color:var(--accent)}
  /* filtros checkbox */
  .chk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap}
  .chk input{width:15px;height:15px;accent-color:var(--primary)}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(15,27,45,.5);display:none;align-items:center;justify-content:center;z-index:120;padding:20px}
  .modal.on{display:flex}
  .modal-box{background:#fff;border-radius:14px;max-width:440px;width:100%;box-shadow:0 18px 50px rgba(0,0,0,.3);overflow:hidden}
  .modal-box h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);font-size:15px}
  .modal-body{padding:16px 18px;display:grid;gap:14px}
  .exp-areas{display:flex;flex-wrap:wrap;gap:7px}
  .exp-areas label{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;background:#f7f9fc;
                   border:1px solid var(--line);border-radius:8px;padding:5px 9px;cursor:pointer}
  .exp-opts{display:grid;gap:8px;border-top:1px solid var(--line);padding-top:12px}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--line);background:#f7f9fc}
  .btn-prim{padding:9px 16px;border:0;border-radius:8px;background:var(--primary);color:#fff;font-weight:700}
  .btn-prim:hover{background:var(--primary-d)}
  .linkish{background:none;border:0;color:var(--primary);font-weight:600;font-size:12.5px;text-decoration:underline}

  @media(max-width:560px){
    .meta{display:none}
    td.desc{max-width:170px}
    th,td{padding:8px 9px}
    .cards{grid-template-columns:1fr 1fr}
    .area-grid{grid-template-columns:1fr 1fr}
  }

  /* ---- Área de impresión (listas de conteo) ---- */
  #printArea{display:none}
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%}
    .pg{page-break-after:always;padding:0 4mm}
    .pg:last-child{page-break-after:auto}
  }
  #printArea .ph{border-bottom:2px solid #0a4ea3;padding-bottom:6px;margin-bottom:8px}
  #printArea .ph-top{font-size:11pt;font-weight:800;color:#073a7a}
  #printArea .ph-sub{font-size:8.5pt;color:#555}
  #printArea .ph-ubi{font-size:13pt;font-weight:800;margin-top:4px}
  #printArea .ph-meta{font-size:9pt;margin-top:4px;color:#222}
  #printArea .ph-meta u{text-decoration:none;border-bottom:1px solid #999;display:inline-block;min-width:120px}
  #printArea table.pt{width:100%;border-collapse:collapse;font-size:8.5pt}
  #printArea table.pt th{background:#0a4ea3;color:#fff;padding:4px 6px;text-align:left;font-size:8pt}
  #printArea table.pt td{border:1px solid #cbd5e1;padding:3px 6px}
  #printArea .col-fis{background:#fffbe9}
  #printArea .pf{display:flex;justify-content:space-between;font-size:7.5pt;color:#666;margin-top:6px}
</style>
</head>

/* ============ CONFIG ============ */
const DATA_URL = "datos.enc";

/* ============ CRIPTO (Web Crypto, compatible con publicar.py) ============ */
const b64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function descifrar(sobre, clave){
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(clave), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(sobre.salt), iterations:sobre.iter, hash:sobre.hash},
    baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(sobre.iv)}, key, b64(sobre.ct));
  let bytes = new Uint8Array(buf);
  if(sobre.gzip){
    const ds = new DecompressionStream('gzip');
    const r = new Response(new Blob([bytes]).stream().pipeThrough(ds));
    bytes = new Uint8Array(await r.arrayBuffer());
  }
  return JSON.parse(new TextDecoder().decode(bytes));
}

/* ============ ESTADO ============ */
let DB = null, SOBRE = null;
const $ = s => document.querySelector(s);

/* ============ GATE ============ */
async function cargarSobre(){
  if(SOBRE) return SOBRE;
  const res = await fetch(DATA_URL, {cache:"no-store"});
  if(!res.ok) throw new Error("fetch");
  SOBRE = await res.json(); return SOBRE;
}
/* ============ GATE ============ */
async function cargarSobre(){
  if(SOBRE) return SOBRE;
  const res = await fetch(DATA_URL, {cache:"no-store"});
  if(!res.ok) throw new Error("fetch");
  SOBRE = await res.json(); return SOBRE;
}

// Clave embebida — el cifrado protege el archivo en tránsito, no el acceso
const _K = "TX41-Puebla-2026";

async function intentarEntrar(){
  const btn=$("#enter"), err=$("#gateErr");
  btn.disabled=true; btn.textContent="Entrando…";
  err.textContent="";
  try{
    if(!DB){
      const sobre = await cargarSobre();
      DB = await descifrar(sobre, _K);
    }
    arrancarApp();
  }catch(e){
    console.error("[TX41]",e);
    btn.disabled=false; btn.textContent="Acceder";
    if(e.message==="fetch") err.textContent="No se pudo cargar los datos. Verifica tu conexión.";
    else err.textContent="Error al cargar: "+e.message;
  }
}

async function precargar(){
  // Carga silenciosa en background para mostrar info y habilitar el botón
  const btn=$("#enter");
  try{
    const sobre = await cargarSobre();
    DB = await descifrar(sobre, _K);
    const m=DB.meta;
    $("#gate-generado").textContent=new Date(m.generado).toLocaleString("es-MX");
    $("#gate-mats").textContent=(m.n_materiales||0).toLocaleString("es-MX")+" materiales · "+(m.n_almacenes||0)+" almacenes";
    btn.disabled=false;
  }catch(e){
    console.error("[TX41 preload]",e);
    $("#gate-generado").textContent="Sin conexión";
    $("#gate-mats").textContent="";
    btn.disabled=false; // dejar que intente igual
  }
}

$("#enter").onclick=()=>intentarEntrar();
window.addEventListener("DOMContentLoaded", ()=>{ precargar(); });

/* ============ APP / ROUTER ============ */
function arrancarApp(){
  $("#gate").hidden = true; $("#app").hidden = false;
  try{
    const m = DB.meta;
    $("#meta").innerHTML = `Generado ${new Date(m.generado).toLocaleString('es-MX')}<br>`+
      `${m.n_materiales.toLocaleString('es-MX')} materiales · ${m.n_almacenes} almacenes`;
    $("#backBtn").onclick = mostrarMenu;
    mostrarMenu();
  }catch(e){
    $("#gate").hidden=false; $("#app").hidden=true;
    $("#gateErr").textContent = "Error al mostrar datos: "+e.name+" — "+e.message;
  }
}
function mostrarMenu(){
  invSel=null;
  document.querySelector("main").classList.remove("fullwidth");
  $("#backBtn").style.display="none";
  $("#moduleView").hidden=true; $("#menuView").hidden=false;
  renderMenu();
}
function abrirModulo(id){
  $("#backBtn").style.display="inline-flex";
  $("#backBtn").onclick=mostrarMenu;
  $("#menuView").hidden=true; $("#moduleView").hidden=false;
  window.scrollTo(0,0);
  // OR usa todo el ancho; el resto respeta max-width
  document.querySelector("main").classList.toggle("fullwidth", id==="or");
  ({inventario:modInventario, analisis:modAnalisis, directorio:modDirectorio, or:modOR, config:modConfig}[id])();
}

/* ============ HELPERS DE DATOS ============ */
const almList = ()=> Object.values(DB.directorio.almacenes);
const almName = k => (DB.directorio.almacenes[k]?.desc)||k;
const mat = c => DB.materiales[c] || {desc:"",um:"",area:"",ubic:""};
const DIST = ()=> DB.meta.almacen_distribuidor;
function almacenesConExistencia(){ const s=new Set(); for(const e of Object.values(DB.existencias)) for(const k in e) s.add(k); return s; }
function stkClass(n){ return n<=0?"":(n<5?"low":"ok"); }
function nfmt(n){ return n.toLocaleString('es-MX'); }
function descargarXLSX(aoa, hoja, nombre){
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), hoja);
  XLSX.writeFile(wb, nombre+".xlsx");
}

/* ============ MENÚ ============ */
const ICONS={
  inventario:'<path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/>',

/* ============ INVENTARIO (D041 por área, con tarjetas) ============ */
const AREA_ICON={Herramientas:"🔧",Misceláneos:"🔩",Papelería:"📄",Cables:"🔌","Ropa y Calzado":"👔",Baja:"📦"};
const TODO="__TODO__";
let invSel=null, invSort={col:"exist",dir:-1};

// existencia del distribuidor para un catálogo (null si no aparece)
function existDist(cat){ const e=DB.existencias[cat]; return e && DIST() in e ? e[DIST()] : null; }
// traslado del distribuidor (0 si no hay)
function trasDist(cat){ const t=DB.traslados&&DB.traslados[cat]; return t && DIST() in t ? t[DIST()] : 0; }
// lotes reales del distribuidor (lista, vacío si no hay)
function lotesDe(cat){ return (DB.lotes&&DB.lotes[cat])||[]; }

// Construye filas desde el MAESTRO para un área (o TODO). Incluye materiales sin existencia (exist=null).
function matsArea(area){
  const out=[];
  for(const [cat,m] of Object.entries(DB.materiales)){
    if(area!==TODO && (m.area||"")!==area) continue;
    out.push({cat,desc:m.desc||"",um:m.um||"",area:m.area||"Sin clasificar",ubic:m.ubic||"",
              exist:existDist(cat),tras:trasDist(cat),lotes:lotesDe(cat)});
  }
  return out;
}

function modInventario(){
  if(invSel===null) return renderAreasInv();
  return renderDetalleInv();
}

/* ---- Pantalla de tarjetas de área ---- */
function renderAreasInv(){
  $("#backBtn").onclick=mostrarMenu;

  const tot={}, conx={};
  for(const [cat,m] of Object.entries(DB.materiales)){
    const a=m.area||"Sin clasificar"; tot[a]=(tot[a]||0)+1;
    if(existDist(cat)!==null) conx[a]=(conx[a]||0)+1;
  }
  const totalConx=Object.values(conx).reduce((s,n)=>s+n,0);
  const totalMaestro=Object.keys(DB.materiales).length;
  const cards=AREAS.map(a=>`

      <span class="cnt">${nfmt(conx[a]||0)}</span>
      <button class="exp" data-exp="${a}">⬇ Excel</button>

        <div class="an">Todo el inventario</div>
        <div class="ae">${nfmt(totalConx)} con existencia · ${nfmt(totalMaestro)} en maestro</div>
        <span class="cnt" style="color:var(--primary)">${nfmt(totalConx)}</span>
        <button class="exp" data-exp="${TODO}">⬇ Exportar…</button>

  $("#moduleView").querySelectorAll(".area-card").forEach(c=> c.onclick=()=>{ invSel=c.dataset.a; invSort={col:"exist",dir:-1}; renderDetalleInv(); window.scrollTo(0,0); });
  // export rápido por tarjeta
  $("#moduleView").querySelectorAll(".exp").forEach(b=> b.onclick=(ev)=>{ ev.stopPropagation();
    const a=b.dataset.exp; if(a===TODO) abrirModalExp(); else exportarArea(a,false); });

// aplica los filtros del detalle a las filas del área actual
function filasInv(){
  const q=($("#invSearch")?.value||"").trim().toLowerCase();
  const ceros=$("#invCeros")?.checked;
  const soloTras=$("#invTras")?.checked;
  const ubiSel=$("#invUbi")?.value||"";
  const areaSel=$("#invArea")?.value||"";
  let rows=matsArea(invSel).filter(m=>{
    if(q && !(m.cat.toLowerCase().includes(q)||m.desc.toLowerCase().includes(q))) return false;
    if(ubiSel && m.ubic!==ubiSel) return false;
    if(areaSel && m.area!==areaSel) return false;
    if(ceros && !(m.exist!==null && m.exist>0)) return false;
    if(soloTras && !(m.tras>0)) return false;
    if($("#invLotes")?.checked && !(m.lotes&&m.lotes.length>0)) return false;
    return true;
  });
  rows.sort((a,b)=>{const c=invSort.col,k=invSort.dir;
    if(c==="exist") return ((a.exist??-1)-(b.exist??-1))*k;
    if(c==="tras") return ((a.tras||0)-(b.tras||0))*k;
    return String(a[c]||"").localeCompare(String(b[c]||""))*k;});
  return rows;
}
function pintarInv(){
  const esTodo=invSel===TODO, rows=filasInv();
  const conx=rows.filter(r=>r.exist!==null&&r.exist>0).length;
  $("#invCount").textContent=`${nfmt(rows.length)} materiales · ${nfmt(conx)} con existencia`;
  const cols=esTodo
    ? `<th data-c="cat">Catálogo</th><th data-c="desc">Descripción</th><th data-c="area">Área</th><th data-c="ubic">Ubicación</th><th data-c="exist" class="r">Existencia</th><th data-c="tras" class="r">Traslado</th>`
    : `<th data-c="cat">Catálogo</th><th data-c="desc">Descripción</th><th data-c="um">U.M.</th><th data-c="ubic">Ubicación</th><th data-c="exist" class="r">Existencia</th><th data-c="tras" class="r">Traslado</th>`;
  const ncols = esTodo?6:6;
  $("#invTable").innerHTML=`<thead><tr>${cols}</tr></thead><tbody>${
    rows.length? rows.map(r=>{
      const ex = r.exist===null ? `<span style="color:var(--zero);font-style:italic">—</span>`
                : `<span class="stk ${stkClass(r.exist)}">${nfmt(r.exist)}</span>`;
      const tr = r.tras>0 ? `<span class="stk tras">${nfmt(r.tras)}</span>` : `<span style="color:var(--zero)">—</span>`;
      const tieneLotes = r.lotes && r.lotes.length>0;
      const badge = tieneLotes ? ` <span class="lote-badge" data-lt="${r.cat}">📦 ${r.lotes.length} lote${r.lotes.length>1?'s':''}</span>` : "";
      const main = esTodo
        ? `<tr><td class="cat num">${r.cat}</td><td class="desc">${r.desc||"—"}${badge}</td>
             <td><span class="area-tag">${r.area||"—"}</span></td><td>${r.ubic||"—"}</td>
             <td class="r">${ex} <small style="color:var(--muted)">${r.um}</small></td><td class="r">${tr}</td></tr>`
        : `<tr><td class="cat num">${r.cat}</td><td class="desc">${r.desc||"—"}${badge}</td>
             <td>${r.um||"—"}</td><td>${r.ubic||"—"}</td>
             <td class="r">${ex} <small style="color:var(--muted)">${r.um}</small></td><td class="r">${tr}</td></tr>`;
      const filaLotes = tieneLotes
        ? `<tr class="lotes-row" id="lt-${r.cat}" hidden><td colspan="${ncols}" style="padding:0;background:#fffaf2">
             <table class="lotes-sub"><thead><tr><th>Lote</th><th class="r">Libre</th><th class="r">Traslado</th></tr></thead>
             <tbody>${r.lotes.map(l=>`<tr><td class="num">${l.lote}</td><td class="r num">${nfmt(l.lib)}</td>
               <td class="r num" style="color:var(--low)">${nfmt(l.tras||0)}</td></tr>`).join("")}</tbody></table></td></tr>`
        : "";
      return main+filaLotes;
    }).join("") : `<tr><td colspan="6" class="empty">Sin coincidencias.</td></tr>`}</tbody>`;
  $("#invTable").querySelectorAll("th[data-c]").forEach(th=> th.onclick=()=>{
    const c=th.dataset.c; invSort={col:c,dir:invSort.col===c?-invSort.dir:(c==="exist"||c==="tras"?-1:1)}; pintarInv(); });
  $("#invTable").querySelectorAll(".lote-badge").forEach(b=> b.onclick=()=>{
    const row=document.getElementById("lt-"+b.dataset.lt); if(row) row.hidden=!row.hidden; });
}

/* ---- Exportaciones de Inventario ---- */
function fechaTag(){ return new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-'); }
function expFilas(mats){
  const aoa=[["Área","Catálogo","Descripción","U.M.","Ubicación","Existencia D041","Traslado","Lote"]];
  mats.forEach(m=>{
    aoa.push([m.area,m.cat,m.desc,m.um,m.ubic, m.exist===null?"":m.exist, m.tras||0, ""]);
    if(m.lotes && m.lotes.length){
      m.lotes.forEach(l=> aoa.push(["","  ↳ lote","","","", l.lib, l.tras||0, l.lote]));
    }
  });
  return aoa;
}

// export directo de un área (desde la tarjeta)
function exportarArea(area,soloExist){
  let mats=matsArea(area); if(soloExist) mats=mats.filter(m=>m.exist!==null&&m.exist>0);
  if(!mats.length){ alert("No hay materiales para exportar en "+area); return; }
  mats.sort((a,b)=>(b.exist??-1)-(a.exist??-1));
  descargarXLSX(expFilas(mats), (area===TODO?"Todo":area).substring(0,28), `Inventario_${area===TODO?"Todo":area.replace(/ /g,"_")}_${fechaTag()}`);
}
// export del detalle respetando filtros actuales
function exportarFiltrado(){
  const mats=filasInv(); if(!mats.length){ alert("No hay materiales con los filtros actuales."); return; }
  const nom=invSel===TODO?"Todo":invSel.replace(/ /g,"_");
  descargarXLSX(expFilas(mats), (invSel===TODO?"Todo":invSel).substring(0,28), `Inventario_${nom}_${fechaTag()}`);
}

  if(!mats.length){ alert("No hay materiales con esos criterios."); return; }
  mats.sort((a,b)=> a.area===b.area ? (b.exist??-1)-(a.exist??-1) : a.area.localeCompare(b.area));
  const nom=sel.length===AREAS.length?"Todo":sel.join("_").substring(0,28);
  descargarXLSX(expFilas(mats), "Inventario", `Inventario_${nom}_${fechaTag()}`);
  cerrarModalExp();

/* ---- Modal de ubicaciones para conteo ---- */
function imprimirConteo(){
  const mats=filasInv();
  if(!mats.length){ alert("No hay materiales con los filtros actuales."); return; }
  // agrupar por ubicación
  const grupos={};
  mats.forEach(m=>{ const u=m.ubic||"Sin asignar"; (grupos[u] ||= []).push(m); });

  if(ubis.length===1){
    // si solo hay una ubicación, imprimir directo

    catDesc.textContent=m.desc+(m.um?" · "+m.um:""); catDesc.className="an-desc ok";
    $("#an-btn-exp-cat").style.display="inline-flex";
    anDatosCat=[]; anRenderTablaCat(anSortCatCol);
  });
  document.addEventListener("click", e=>{ if(!catSugs.contains(e.target)&&e.target!==catInp) catSugs.style.display="none"; },{once:false,capture:false});
  $("#an-cat-filtro")?.addEventListener("input",()=>anRenderTablaCat(anSortCatCol));
  $("#an-cat-solo")?.addEventListener("change",()=>anRenderTablaCat(anSortCatCol));
  $("#an-btn-exp-cat")?.addEventListener("click",anExportarCat);
  // ---- Buscador almacén ----
  if(tieneConsumos){
    const almInp=$("#an-alm-input"), almSugs=$("#an-alm-sugs"), almHid=$("#an-alm-sel");
    almInp.oninput=()=>{
      const q=almInp.value.trim().toLowerCase();
      const hits=almsCons.filter(a=> a.toLowerCase().includes(q)||anNombre(a).toLowerCase().includes(q));
      almSugs.innerHTML=hits.map(a=>`<div class="an-cat-sug" data-a="${a}"><b style="color:var(--primary)">${a}</b> · ${anNombre(a)}</div>`).join("");
      almSugs.style.display=hits.length?"block":"none";
    };
    almInp.addEventListener("focus",()=>{ almInp.oninput(); });
    almSugs.addEventListener("pointerdown",e=>{ const t=e.target.closest("[data-a]"); if(!t) return;
      almHid.value=t.dataset.a; almInp.value=t.dataset.a+" — "+anNombre(t.dataset.a); almSugs.style.display="none"; anRenderAlm(); });
    $("#an-alm-buscar").oninput=()=>{ if(almHid.value) anRenderAlm(); };
    $("#an-solo-pos").onchange=()=>{ if(almHid.value) anRenderAlm(); };
    $("#an-btn-exp-alm").onclick=anExportarAlm;
  }
}

function anMCPM(){ return Math.max(1,parseFloat($("#anMCPM")?.value)||6); }
function anMStk(){ return Math.max(0.1,parseFloat($("#anMStk")?.value)||1.5); }

/* ---- Análisis por catálogo (distribución entre almacenes) ---- */
function anRenderTablaCat(col){
  if(!anCatSel) return;
  if(anSortCatCol===col) anSortCatDir=-anSortCatDir; else { anSortCatCol=col; anSortCatDir=col==="alm"?1:-1; }
  const per=anMCPM(), obj=anMStk(), cat=anCatSel, m=mat(cat);
  const qFilt=($("#an-cat-filtro")?.value||"").toLowerCase(), soloDem=$("#an-cat-solo")?.checked;
  const alms=almList().map(a=>a.clave);
  anDatosCat=alms.map(alm=>{
    const cons=(DB.consumos?.[alm]?.[cat])||0;
    const ex=(DB.existencias?.[cat]?.[alm])||0;
    const mens=cons/per, nec=mens*obj, dist=Math.max(0,nec-ex);
    const exD=(DB.existencias?.[cat]?.[DIST()])||0;
    return {alm,cons,mens,ex,nec,dist,exD};
  }).filter(r=>{
    if(qFilt && !(r.alm.toLowerCase().includes(qFilt)||anNombre(r.alm).toLowerCase().includes(qFilt))) return false;
    if(soloDem && r.dist<0.5) return false;
    return true;
  });
  anDatosCat.sort((a,b)=>{
    if(anSortCatCol==="alm") return a.alm.localeCompare(b.alm)*anSortCatDir;
    return ((a[anSortCatCol]||0)-(b[anSortCatCol]||0))*anSortCatDir;
  });
  const ic=c=>c===anSortCatCol?(anSortCatDir===1?" ▲":" ▼"):" ⇅";
  const anFmt=(n,d=0)=>n==null||isNaN(n)?"-":Number(n).toLocaleString("es-MX",{minimumFractionDigits:d,maximumFractionDigits:d});
  $("#an-cat-title").innerHTML=`${cat} · ${m.desc} <span style="color:var(--muted);font-size:13px;font-weight:400">${m.um||""}</span>`;
  $("#an-cat-count").textContent=`${anDatosCat.length} almacenes`;
  const tbl=$("#an-tabla-cat");
  tbl.innerHTML=`<thead><tr>
    <th onclick="_anSortCat('alm')">Almacén${ic("alm")}</th>
    <th class="r" onclick="_anSortCat('cons')">Consumo total${ic("cons")}</th>
    <th class="r" onclick="_anSortCat('mens')">Cons. mensual${ic("mens")}</th>
    <th class="r" onclick="_anSortCat('ex')">Existencia${ic("ex")}</th>
    <th class="r" onclick="_anSortCat('nec')">Stock obj.(${obj.toFixed(1)}m)${ic("nec")}</th>
    <th class="r" onclick="_anSortCat('dist')">Distribución${ic("dist")}</th>
    <th>Estado</th><th></th>
  </tr></thead><tbody>${anDatosCat.length? anDatosCat.map(({alm,cons,mens,ex,nec,dist})=>{
    const nc=cons===0;
    const badge=nc?`<span class="an-badge g">Sin consumo</span>`
      :dist<0.5?`<span class="an-badge v">✓ Suficiente</span>`
      :dist<=mens?`<span class="an-badge a">↑ Bajo</span>`
      :`<span class="an-badge r">⚠ Déficit</span>`;
    const yaFijada=_anFijadas.some(f=>f.cat===cat&&f.alm===alm);
    return `<tr>
      <td><div class="an-alm-code">${alm}</div><div class="an-alm-name">${anNombre(alm)}</div></td>
      <td class="r num">${nc?"—":anFmt(cons)}</td>
      <td class="r num">${nc?"—":anFmt(mens,1)}</td>
      <td class="r num">${anFmt(ex)}</td>
      <td class="r num">${nc?"—":anFmt(nec,1)}</td>
      <td class="r num" style="font-weight:700;color:${dist>0.5?"var(--low)":"var(--ok)"}">${dist>0.5?anFmt(dist,1):"—"}</td>
      <td>${badge}</td>
      <td><button class="btn an-fijar" data-cat="${cat}" data-alm="${alm}"
          data-desc="${(m.desc||"").replace(/"/g,"")}" data-um="${m.um||""}"
          data-cons="${cons}" data-ex="${ex}" data-dist="${dist}"
          style="${yaFijada?"background:var(--primary);color:#fff":""}"
          title="${yaFijada?"Ya fijada":"Fijar en tabla custom"}">📌</button></td>
    </tr>`;}).join(""):`<tr><td colspan="8" class="empty">Sin datos con los filtros actuales.</td></tr>`}</tbody>`;
  tbl.querySelectorAll(".an-fijar").forEach(btn=>btn.onclick=()=>{
    const {cat,alm,desc,um,cons,ex,dist}=btn.dataset;
    _fijarFila({cat,alm,desc,um,cons:+cons,ex:+ex,dist:+dist});
    anRenderTablaCat(anSortCatCol);
  });
}
function _fijarFila(fila){
  const idx=_anFijadas.findIndex(f=>f.cat===fila.cat&&f.alm===fila.alm);
  if(idx>=0) _anFijadas.splice(idx,1); // toggle: si ya existe, quitar
  else _anFijadas.push(fila);
  _renderFijadas();
}
function _renderFijadas(){
  const bar=document.getElementById("an-fijadas-bar");
  const chips=document.getElementById("an-fijadas-chips");
  if(!bar||!chips) return;
  if(!_anFijadas.length){ bar.classList.remove("on"); return; }
  bar.classList.add("on");
  chips.innerHTML=_anFijadas.map((f,i)=>`
    <div class="fijada-chip">
      <span><b>${f.cat}</b> · ${f.alm} <span style="color:var(--muted);font-size:11px">${(f.desc||"").substring(0,25)}</span></span>
      <button onclick="_quitarFijada(${i})" title="Quitar">×</button>
    </div>`).join("");
}
function _quitarFijada(i){ _anFijadas.splice(i,1); _renderFijadas(); }
function _exportarCustom(){
  if(!_anFijadas.length){ alert("No hay filas fijadas."); return; }
  const per=anMCPM(), obj=anMStk();
  const aoa=[
    [`Tabla personalizada · CPM ${per}m · Stock obj. ${obj}m`],
    [],
    ["Catálogo","Descripción","U.M.","Almacén","Nombre almacén","Consumo total",
     "Cons. mensual","Existencia",`Stock obj.(${obj}m)`,"Distribución","D041 disponible"],
    ..._anFijadas.map(f=>{
      const m=mat(f.cat);
      const cons=(DB.consumos?.[f.alm]?.[f.cat])||0;
      const mens=cons/per, nec=mens*obj;
      const dist=Math.max(0,nec-(DB.existencias?.[f.cat]?.[f.alm]||0));
      const exD=(DB.existencias?.[f.cat]?.[DIST()])||0;
      return [f.cat,m.desc||f.desc,m.um||f.um,f.alm,anNombre(f.alm),
              cons,+(mens.toFixed(2)),DB.existencias?.[f.cat]?.[f.alm]||0,
              +(nec.toFixed(2)),+(dist.toFixed(1)),exD];
    })
  ];
  descargarXLSX(aoa,"Distribución",`Analisis_Custom_${fechaTag()}`);
}
function _anSortCat(col){ anRenderTablaCat(col); }

/* ---- Análisis por almacén ---- */
function anRenderAlm(){
  const alm=$("#an-alm-sel")?.value; if(!alm) return;
  const per=anMCPM(), obj=anMStk();
  const cAlm=DB.consumos?.[alm]||{}, eAlm={};
  // existencias del almacén
  for(const [cat,e] of Object.entries(DB.existencias)) if(alm in e) eAlm[cat]=e[alm];
  const q=($("#an-alm-buscar")?.value||"").toLowerCase();
  const soloDem=$("#an-solo-pos")?.checked;
  const D=DIST(), eD={};
  for(const [cat,e] of Object.entries(DB.existencias)) if(D in e) eD[cat]=e[D];
  anDatosAlm=Object.keys(cAlm).filter(cat=>{
    const m=mat(cat);
    if(q && !(cat.includes(q)||(m.desc||"").toLowerCase().includes(q))) return false;
    const dist=Math.max(0,(cAlm[cat]/per)*obj-(eAlm[cat]||0));
    if(soloDem && dist<0.5) return false;
    return true;
  }).map(cat=>{
    const m=mat(cat), cons=cAlm[cat]||0, ex=eAlm[cat]||0;
    const mens=cons/per, nec=mens*obj, dist=Math.max(0,nec-ex), exD=eD[cat]||0;
    return {cat,desc:m.desc,um:m.um,area:m.area,cons,mens,ex,nec,dist,exD};
  }).sort((a,b)=>b.dist-a.dist);
  anSortAlmCol="dist"; anSortAlmDir=-1;
  $("#an-alm-title").innerHTML=`${alm} · ${anNombre(alm)}`;
  _pintarTablaAlm(obj);
}
function _pintarTablaAlm(obj){
  const col_=anSortAlmCol, dir_=anSortAlmDir;
  const ic=c=>c===col_?(dir_===1?" ▲":" ▼"):" ⇅";
  const anFmt=(n,d=0)=>n==null||isNaN(n)?"-":Number(n).toLocaleString("es-MX",{minimumFractionDigits:d,maximumFractionDigits:d});
  const o=obj||anMStk();
  const filas=[...anDatosAlm].sort((a,b)=>{
    if(["cat","desc","area"].includes(col_)) return String(a[col_]||"").localeCompare(String(b[col_]||""))*dir_;
    return ((a[col_]||0)-(b[col_]||0))*dir_;
  });
  const alm=$("#an-alm-sel")?.value||"";
  const wrap=document.getElementById("an-tabla-alm");
  const btnExp=document.getElementById("an-btn-exp-alm");
  if(!filas.length){ wrap.innerHTML=`<div class="empty" style="padding:24px">Sin coincidencias.</div>`; if(btnExp) btnExp.style.display="none"; return; }
  $("#an-alm-count").textContent=`${filas.length} catálogos`;
  wrap.innerHTML=`<div class="scroll"><table>
    <thead><tr>
      <th onclick="_anSortAlm('cat')">Catálogo${ic("cat")}</th>
      <th onclick="_anSortAlm('desc')">Descripción${ic("desc")}</th>
      <th class="r">UM</th>
      <th class="r" onclick="_anSortAlm('mens')">Cons. mensual${ic("mens")}</th>
      <th class="r" onclick="_anSortAlm('ex')">Existencia ${alm}${ic("ex")}</th>
      <th class="r" onclick="_anSortAlm('nec')">Stock obj.(${o.toFixed(1)}m)${ic("nec")}</th>
      <th class="r" onclick="_anSortAlm('dist')">Distribución${ic("dist")}</th>
      <th class="r" onclick="_anSortAlm('exD')">D041 disponible${ic("exD")}</th>
      <th>D041</th>
    </tr></thead><tbody>${filas.map(({cat,desc,um,mens,ex,nec,dist,exD})=>{
      const badge=dist<0.5?""
        :exD>=dist?`<span class="an-badge v">✓</span>`:`<span class="an-badge r">Insuf.</span>`;
      return `<tr>
        <td class="cat num">${cat}</td>
        <td style="font-size:12px;max-width:220px">${desc||""}</td>
        <td class="r" style="font-size:11px;color:var(--muted)">${um||""}</td>
        <td class="r num">${anFmt(mens,1)}</td>
        <td class="r num">${anFmt(ex)}</td>
        <td class="r num">${anFmt(nec,1)}</td>
        <td class="r num" style="font-weight:700;color:${dist>0.5?"var(--low)":"var(--ok)"}">${dist>0.5?anFmt(dist,1):"—"}</td>
        <td class="r num">${anFmt(exD)}</td>
        <td>${badge}</td></tr>`;
    }).join("")}</tbody></table></div>`;
  if(btnExp) btnExp.style.display="inline-flex";
}
function _anSortAlm(col){
  if(col===anSortAlmCol) anSortAlmDir=-anSortAlmDir; else { anSortAlmCol=col; anSortAlmDir=["cat","desc","area"].includes(col)?1:-1; }
  _pintarTablaAlm(anMStk());
}
function anExportarCat(){
  if(!anCatSel) return; const cat=anCatSel, m=mat(cat), per=anMCPM(), obj=anMStk();
  const rows=almList().map(a=>{
    const alm=a.clave; const cons=(DB.consumos?.[alm]?.[cat])||0;
    const ex=(DB.existencias?.[cat]?.[alm])||0;
    const mens=cons/per, nec=mens*obj, dist=Math.max(0,nec-ex);
    const exD=(DB.existencias?.[cat]?.[DIST()])||0;
    return [alm,anNombre(alm),cons,+(mens.toFixed(2)),ex,+(nec.toFixed(2)),+(dist.toFixed(1)),exD];
  });
  descargarXLSX([
    [`Catálogo: ${cat} — ${m.desc||""}`,""],[`Periodo: ${per}m | Stock obj: ${obj}m`,""],
    [],["Almacén","Nombre","Consumo total","Cons. mensual","Existencia",`Stock obj.(${obj}m)`,"Distribución","D041 disponible"],
    ...rows
  ],"Distribución",`Dist_${cat}_${fechaTag()}`);
}
function anExportarAlm(){
  const alm=$("#an-alm-sel")?.value; if(!alm||!anDatosAlm.length) return;
  const per=anMCPM(), obj=anMStk();
  descargarXLSX([
    [`Almacén: ${alm} — ${anNombre(alm)}`,""],[`Periodo: ${per}m | Stock obj: ${obj}m`,""],
    [],["Catálogo","Descripción","UM","Consumo total","Cons. mensual","Existencia",`Stock obj.(${obj}m)`,"Distribución","D041 disponible"],
    ...[...anDatosAlm].sort((a,b)=>b.dist-a.dist).map(r=>[r.cat,r.desc,r.um,r.cons,+(r.mens.toFixed(2)),r.ex,+(r.nec.toFixed(2)),+(r.dist.toFixed(1)),r.exD])
  ], alm, `Dist_${alm}_${fechaTag()}`);
}

function pintarDir(){
  const q=$("#dirSearch").value.trim().toLowerCase(); let alms=almList();

  if(q) alms=alms.filter(a=> a.clave.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q)||(a.centro_desc||"").toLowerCase().includes(q)||(a.centro||"").toLowerCase().includes(q));
  const byC={}; alms.forEach(a=> (byC[a.centro] ||= {desc:a.centro_desc,items:[]}).items.push(a));
  $("#dirCount").textContent=`${alms.length} almacenes`;

    return `<div class="dir-centro">${g.desc||c} <span>${c}</span></div>`+

          ${dist?'<span class="badge">Distribuidor</span>':(a.recurrente&&dirScope==='todos'?'<span class="badge">Recurrente</span>':'')}</div>`;}).join("");

}

  });

  pintarOR();
}

function calcularOR(){
  const D=DIST(), cons=DB.consumos?.[orAlm]||{};
  const mCPM=Math.max(1,+$("#orMCPM")?.value||6), mStk=Math.max(0.1,+$("#orMS")?.value||1.5);
  const out=[];
  for(const [cat,consumo] of Object.entries(cons)){
    const info=mat(cat), ng=ngDe(cat)||"SIN SUSTITUTO";
    const cpm=consumo/mCPM;
    const exAux=(DB.existencias?.[cat]?.[orAlm])||0;
    const exD=(DB.existencias?.[cat]?.[D])||0;
    const calcSurtir=mStk*cpm-exAux;
    const man=_orManual[orAlm+"|"+cat]||{};
    // Punto 1: solo proponer X surtir para SIN SUSTITUTO; los demás arrancan en 0
    const esSinSust=ng==="SIN SUSTITUTO";
    const sugerido=esSinSust ? Math.max(0,Math.min(Math.round(calcSurtir),exD)) : 0;
    const xsurtir=man.xs!=null ? man.xs : sugerido;
    const mdInv=cpm>0?exAux/cpm:null;
    const excedente=(3*cpm-exAux)<0;
    out.push({cat,desc:info.desc,um:info.um,area:info.area||"Sin clasificar",ng,consumo,cpm,exAux,exD,calcSurtir,xsurtir,mdInv,excedente,obs:man.obs||""});
  }
  return out;
}

function filasOR(){
  const q=($("#orSearch")?.value||"").trim().toLowerCase();
  const fArea=$("#orFArea")?.value||"";
  const ngHid=$("#orNGVal")?.value||"";
  const ngText=($("#orNGInput")?.value||"").trim().toLowerCase();
  const soloCal=$("#orSolo")?.checked;
  const soloX=$("#orSoloX")?.checked;
  const soloExc=$("#orExced")?.checked;

  let rows=calcularOR().filter(r=>{
    if(q && !(r.cat.toLowerCase().includes(q)||(r.desc||"").toLowerCase().includes(q))) return false;
    if(fArea && r.area!==fArea) return false;
    if(ngHid){ if(r.ng!==ngHid) return false; }
    else if(ngText){ if(!r.ng.toLowerCase().includes(ngText)) return false; }
    if(soloCal && r.calcSurtir<=0) return false;
    if(soloX && r.xsurtir<=0) return false;
    if(soloExc && !r.excedente) return false;
    return true;
  });

  // Punto 2: orden por defecto catálogo asc; respeta el sort manual si el usuario cambió columna
  const c=orSort.col, k=orSort.dir;
  const numCols=["consumo","cpm","exAux","exD","calcSurtir","xsurtir","mdInv"];
  rows.sort((a,b)=> numCols.includes(c)?((a[c]??-1)-(b[c]??-1))*k:String(a[c]||"").localeCompare(String(b[c]||""))*k);
  return rows;
}

const fmt1=n=>n==null?"S/C":(Math.round(n*10)/10).toLocaleString("es-MX");

function _htmlBandaNG(sumNG, open=true){
  const entries=Object.entries(sumNG).sort((a,b)=>b[1].calc-a[1].calc);
  const n=entries.length;
  // Resumen compacto para mostrar en el summary (siempre visible)
  const resumen=entries.slice(0,4).map(([ng,v])=>
    `<span style="font-weight:700;color:#5a3e00">${ng}</span> <span style="color:#c0392b;margin-left:3px">Cálc: <b>${fmt1(v.calc)}</b></span>`
  ).join(' · ')+(n>4?` <span style="color:var(--muted)">+${n-4} más</span>`:"");
  // Chips completos dentro del body del details
  const chips=entries.map(([ng,v])=>`
    <div title="${v.cats.join(', ')}" style="background:#fff;border:1px solid #e8d080;border-radius:8px;padding:4px 10px;font-size:12px;cursor:default;white-space:nowrap">
      <span style="font-weight:700;color:#5a3e00">${ng}</span>
      <span style="color:#7a5c00;margin-left:5px">Cálc: <b>${fmt1(v.calc)}</b></span>
      <span style="color:#0a4ea3;margin-left:5px">X: <b>${nfmt(v.xs)}</b></span>
      <span style="color:var(--muted);font-size:10.5px;margin-left:4px">${v.cats.length} cat.</span>
    </div>`).join("");
  return `<details ${open?"open":""} style="background:#fffbe8;border:1px solid #f0d060;border-radius:10px;margin-bottom:8px">
    <summary style="list-style:none;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none">
      <span style="font-size:12px;font-weight:800;color:#7a5c00;white-space:nowrap">∑ Sustitutos</span>
      <span style="font-size:11px;color:#b8960a;white-space:nowrap">${n} grupo${n!==1?"s":""}</span>
      <span style="flex:1"></span>
      <span class="ng-resumen" style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right">${resumen}</span>
      <span class="ng-arrow" style="font-size:13px;color:#b8960a;flex-shrink:0;margin-left:8px">▾</span>
    </summary>
    <div style="padding:6px 10px 10px;display:flex;flex-wrap:wrap;gap:5px">${chips}</div>
  </details>`;
}
function _repintarBandaNG(){
  const rows=filasOR();
  const sumNG={};
  rows.forEach(r=>{
    if(r.ng==="SIN SUSTITUTO") return;
    if(!sumNG[r.ng]) sumNG[r.ng]={calc:0,xs:0,cats:[]};
    sumNG[r.ng].calc+=r.calcSurtir;
    const man=_orManual[orAlm+"|"+r.cat];
    sumNG[r.ng].xs+=(man?.xs!=null?man.xs:r.xsurtir);
    sumNG[r.ng].cats.push(r.cat);
  });
  const totalX=rows.reduce((s,r)=>{
    const man=_orManual[orAlm+"|"+r.cat]; return s+(man?.xs!=null?man.xs:r.xsurtir);
  },0);
  $("#orResumen").textContent=`${rows.filter(r=>r.calcSurtir>0.5).length} a surtir · Total X surtir: ${nfmt(totalX)}`;
  const bandaEl=$("#orBandaNG"); if(!bandaEl) return;
  if(!Object.keys(sumNG).length){ bandaEl.style.display="none"; bandaEl.innerHTML=""; return; }
  bandaEl.style.display="";
  const wasOpen=bandaEl.querySelector("details")?.open===true;
  bandaEl.innerHTML=_htmlBandaNG(sumNG, wasOpen);
}

        </div>

    </div>
  </div>`;
  document.body.appendChild(modal);

  const getParams=()=>{
    const num=$("#orNumReabasto").value.trim()||"—";

  };

/* ---- Export JSON para exportar_or.py ---- */
function _exportarORJson(rows, numReabasto, generador, areasSeleccionadas){
  const hoy=new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"});
  const mCPM=+$("#orMCPM")?.value||6, mStk=+$("#orMS")?.value||1.5;
  const areas={};
  areasSeleccionadas.forEach(a=>{ areas[a]=[]; });
  rows.forEach(r=>{ if(areas[r.area]) areas[r.area].push({cat:r.cat,desc:r.desc,um:r.um,xs:r.xsurtir,obs:r.obs}); });
  const payload={
    meta:{
      alm_sigla:orAlm, alm_nombre:almName(orAlm),
      num_reabasto:numReabasto, generador, fecha:hoy,
      meses_cpm:mCPM, meses_stock:mStk
    },
    areas
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url;
  a.download=`OR_${orAlm}_Reb${numReabasto}_${hoy.replace(/\//g,"-")}_datos.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}

      </div>
    </div>

    <div class="panel"><div class="panel-head"><h2>📈 Archivos de consumo</h2><span class="pill">Para OR</span></div>
      <div style="padding:16px;display:grid;gap:12px">
        <p style="margin:0;color:var(--muted);font-size:13px">Sube los consumos por almacén auxiliar (ej. <b>TX8A</b>). El nombre del archivo identifica el almacén (TX8A → A08A). Columna B = catálogo, columna C = consumo.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <label class="btn" style="cursor:pointer">📁 Agregar consumos<input type="file" id="upCons" multiple hidden></label>
          <span id="upConsName" style="font-size:13px;color:var(--muted)">Ninguno</span>
        </div>
        <div id="upConsList" style="font-size:13px;display:grid;gap:6px"></div>
      </div>
    </div>

    <div class="panel"><div class="panel-head"><h2>💾 Guardar y publicar</h2></div>
      <div style="padding:16px;display:grid;gap:12px">
        <div id="genResumen" style="font-size:13px;color:var(--muted)">Procesa un TOTAL o agrega consumos para generar un paquete nuevo. También puedes re-publicar el actual.</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn" id="genDescargar">⬇ Descargar datos.enc</button>
          <button class="btn" id="genUsar">↻ Usar ahora (esta sesión)</button>
        </div>
        <details>
          <summary style="cursor:pointer;font-weight:600;color:var(--primary)">Publicar directo en GitHub Pages</summary>
          <div style="display:grid;gap:8px;margin-top:10px;max-width:420px">
            <input id="ghRepo" type="text" placeholder="usuario/repo" value="IvanIslasG/inventario-tx41">
            <input id="ghPath" type="text" placeholder="ruta del archivo" value="datos.enc">
            <input id="ghToken" type="password" placeholder="GitHub token (fine-grained, Contents R/W)">
            <button class="btn-prim" id="ghPublicar">Publicar en GitHub</button>
            <div id="ghStatus" style="font-size:12.5px;color:var(--muted)"></div>
            <p style="font-size:11.5px;color:var(--muted);margin:0">El token se usa solo en tu navegador para esta subida y no se guarda. Usa un token <b>fine-grained</b> limitado a este repo con permiso <i>Contents: Read and write</i>.</p>
          </div>
        </details>
      </div>
    </div>

    <div class="panel"><div style="padding:16px"><button class="btn" id="cfgOut">Recargar datos</button></div></div>
  </div>`;

  // Actualizar existencias
  let totalFile=null;
  $("#upTotal").onchange=e=>{ totalFile=e.target.files[0]||null;
    $("#upTotalName").textContent=totalFile?totalFile.name:"Ningún archivo";
    $("#upProcesar").disabled=!totalFile; };
  $("#upProcesar").onclick=async()=>{
    if(!totalFile) return;
    $("#upResumen").innerHTML=`<span style="color:var(--muted)">Procesando ${totalFile.name}…</span>`;
    try{
      const buf=await totalFile.arrayBuffer();
      const parsed=parseTotalJS(buf);
      _adminTotal=construirBundleJS(parsed);
      const bm=_adminTotal.meta;
      $("#upResumen").innerHTML=`<div style="background:var(--ok-bg);color:var(--ok);padding:10px 12px;border-radius:8px">
        ✅ Procesado: <b>${nfmt(bm.n_con_existencia)}</b> con existencia · <b>${parsed.nAlmacenes}</b> almacenes ·
        <b>${nfmt(parsed.nTraslados)}</b> con traslado · <b>${nfmt(parsed.nLotesD041)}</b> con lotes en D041.</div>`;
      actualizarGenResumen();
    }catch(err){ console.error(err);
      $("#upResumen").innerHTML=`<div style="background:#fde8e8;color:#c0392b;padding:10px 12px;border-radius:8px">Error: ${err.message}</div>`; }
  };

  // Consumos
  $("#upCons").onchange=async e=>{
    _adminConsumos=_adminConsumos||{};
    for(const f of e.target.files){
      try{
        const {alm,mapa,n}=await parseConsumoFile(f);
        _adminConsumos[alm]=mapa;
        renderConsLine(alm,f.name,n,Object.values(mapa).reduce((s,v)=>s+v,0));
      }catch(err){ renderConsLine("?",f.name+" — error: "+err.message,0,0,true); }
    }
    $("#upConsName").textContent=Object.keys(_adminConsumos).length+" almacén(es)";
    actualizarGenResumen();
  };

  // Generar / publicar
  $("#genDescargar").onclick=async()=>{
    const btn=$("#genDescargar");
    btn.disabled=true; btn.textContent="⏳ Cifrando…";
    try{
      const clave=`${_K}`;
      if(!clave){ alert("No se encontró la clave de sesión. Cierra sesión y vuelve a entrar."); return; }
      const sobre=await cifrarJS(bundleFinal(), clave);
      const json=JSON.stringify(sobre);
      const blob=new Blob([json],{type:"application/octet-stream"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a"); a.href=url; a.download="datos.enc";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
      btn.textContent="✅ Descargado";
    }catch(err){
      console.error("Error al cifrar/descargar:",err);
      alert("Error al generar el archivo: "+err.message);
      btn.textContent="⬇ Descargar datos.enc";
    } finally {
      setTimeout(()=>{ btn.disabled=false; btn.textContent="⬇ Descargar datos.enc"; }, 3000);
    }
  };
  $("#genUsar").onclick=()=>{
    DB=bundleFinal(); SOBRE=null; _adminTotal=null; _adminConsumos=null;
    // Actualizar el meta en el header
    const m=DB.meta;
    $("#meta").innerHTML=`Generado ${new Date(m.generado).toLocaleString('es-MX')}<br>${m.n_materiales.toLocaleString('es-MX')} materiales · ${m.n_almacenes} almacenes`;
    mostrarMenu();
    setTimeout(()=>alert("✅ Datos actualizados en esta sesión.\nPara que todos lo vean, descarga y publica el datos.enc."),100);
  };
  $("#ghPublicar").onclick=()=> publicarGitHub();
  $("#cfgOut").onclick=()=>{ location.reload(); };
}
function renderConsLine(alm,info,n,suma,err){
  const div=document.createElement("div");
  div.style.cssText="display:flex;gap:8px;align-items:center;padding:6px 10px;border-radius:8px;background:"+(err?"#fde8e8":"var(--ok-bg)");
  div.innerHTML=err?`<span style="color:#c0392b">⚠ ${info}</span>`
    :`<span style="color:var(--ok)">✅ <b>${alm}</b> · ${almName(alm)} — ${nfmt(n)} catálogos · consumo ${nfmt(suma)}</span>`;
  $("#upConsList").appendChild(div);
}
function actualizarGenResumen(){
  const partes=[];
  if(_adminTotal) partes.push("existencias nuevas");
  if(_adminConsumos&&Object.keys(_adminConsumos).length) partes.push(Object.keys(_adminConsumos).length+" consumo(s)");
  $("#genResumen").innerHTML = partes.length
    ? `Listo para generar: <b>${partes.join(" + ")}</b>. Descarga, usa o publica.`
    : "Procesa un TOTAL o agrega consumos para generar un paquete nuevo. También puedes re-publicar el actual.";
}
// Combina: TOTAL nuevo (o DB actual) + consumos (nuevos sobre los existentes)
function fechaLocalISO(){
  const d=new Date();
  const pad=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function bundleFinal(){
  const b = _adminTotal ? _adminTotal : JSON.parse(JSON.stringify(DB));
  const cons = Object.assign({}, b.consumos||{}, _adminConsumos||{});
  if(Object.keys(cons).length) b.consumos = cons;
  b.meta = Object.assign({}, b.meta, { generado:fechaLocalISO(),
    n_materiales:Object.keys(b.materiales).length, n_almacenes:Object.keys(b.directorio.almacenes).length,
    n_con_existencia:Object.keys(b.existencias).length });
  return b;
}

/* ---- Parser de consumos (TSV de SAP o xlsx) ---- */
function claveDeNombre(nombre){
  const base=nombre.replace(/\.[^.]+$/,"").trim().toUpperCase();
  return /^TX/.test(base) ? "A0"+base.slice(2) : base;
}
async function parseConsumoFile(file){
  const alm=claveDeNombre(file.name);
  const buf=await file.arrayBuffer(); const bytes=new Uint8Array(buf);
  let mapa={};
  if(bytes[0]===0x50 && bytes[1]===0x4B){ // xlsx (zip)
    const wb=XLSX.read(buf,{type:"array"}); const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
    rows.forEach(r=>{ const cat=_txtJS(r[1]); if(/^\d+$/.test(cat)) mapa[cat]=_numJS(r[2]); });
  } else { // texto TSV
    const txt=new TextDecoder("iso-8859-1").decode(buf);
    txt.split(/\r?\n/).forEach(ln=>{ const p=ln.split("\t"); if(p.length<3) return;
      const cat=_txtJS(p[1]); if(/^\d+$/.test(cat)) mapa[cat]=_numJS(p[2]); });
  }
  if(!Object.keys(mapa).length) throw new Error("sin filas válidas (revisa columnas B y C)");
  return {alm, mapa, n:Object.keys(mapa).length};
}

/* ---- Parser del TOTAL en el navegador (replica parser_total.py) ---- */
function _txtJS(v){ return v===null||v===undefined?"":String(v).trim(); }
function _numJS(v){ if(v===null||v===undefined) return 0; const s=String(v).trim().replace(/,/g,""); if(!s) return 0; const f=parseFloat(s); return isNaN(f)?0:f; }
function parseTotalJS(arrayBuffer){
  const wb=XLSX.read(arrayBuffer,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
  let hr=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){ if(rows[i].some(c=>_txtJS(c).toLowerCase()==="material")){ hr=i; break; } }
  if(hr<0) throw new Error("No se encontró la fila de encabezados (columna 'Material').");
  const H=rows[hr]; const col={};
  H.forEach((h,i)=>{ h=_txtJS(h).toLowerCase();
    if(h==="ce."||h.startsWith("centro")) col.centro=i;
    else if(h==="alm."||h.startsWith("almac")) col.almacen=i;
    else if(h==="material") col.material=i;
    else if(h.includes("texto breve")) col.desc=i;
    else if(h==="umb") col.umb=i;
    else if(h==="lote") col.lote=i;
    else if(h.startsWith("librutiliz")||h.includes("libre")) col.libre=i;
    else if(h.startsWith("transytras")||h.includes("traslad")||h.includes("transy")) col.tras=i;
  });
  ["centro","almacen","material","libre"].forEach(k=>{ if(!(k in col)) throw new Error("Falta columna: "+k); });
  const D="D041"; const materiales={}; const almacenes={};
  for(let i=hr+1;i<rows.length;i++){
    const r=rows[i]; if(!r) continue;
    const ce=_txtJS(r[col.centro]), alm=_txtJS(r[col.almacen]), cat=_txtJS(r[col.material]);
    if(!(ce||alm||cat)) continue; if(!(cat&&alm)) continue;
    const libre=_numJS(r[col.libre]); const tras="tras"in col?_numJS(r[col.tras]):0;
    const lote="lote"in col?_txtJS(r[col.lote]):""; const desc="desc"in col?_txtJS(r[col.desc]):""; const umb="umb"in col?_txtJS(r[col.umb]):"";
    almacenes[alm]=ce;
    let m=materiales[cat]; if(!m){ m=materiales[cat]={desc:"",umb:"",almacenes:{},traslados:{},lotes:{}}; }
    if(desc&&!m.desc) m.desc=desc; if(umb&&!m.umb) m.umb=umb;
    const loteReal=lote&&lote.toUpperCase()!=="NUEVO";
    if(loteReal){ (m.lotes[alm]||(m.lotes[alm]=[])).push({lote,lib:libre,tras}); }
    m.almacenes[alm]=(m.almacenes[alm]||0)+libre;
    if(tras) m.traslados[alm]=(m.traslados[alm]||0)+tras;
  }
  return {materiales,almacenes,D,
    nAlmacenes:Object.keys(almacenes).length,
    nTraslados:Object.values(materiales).filter(m=>m.traslados[D]).length,
    nLotesD041:Object.values(materiales).filter(m=>m.lotes[D]).length};
}
function construirBundleJS(parsed){
  const D=parsed.D;
  const materiales={}; for(const [c,v] of Object.entries(DB.materiales)) materiales[c]={...v};
  for(const [cat,m] of Object.entries(parsed.materiales)){
    if(!materiales[cat]) materiales[cat]={um:m.umb,desc:m.desc,area:"",ubic:""};
    else { if(!materiales[cat].desc) materiales[cat].desc=m.desc; if(!materiales[cat].um) materiales[cat].um=m.umb; }
  }
  const existencias={}, traslados={}, lotes={}, valoracion=[];
  for(const [cat,m] of Object.entries(parsed.materiales)){
    const ex={}; for(const[a,v]of Object.entries(m.almacenes)) if(v>0) ex[a]=v;
    if(Object.keys(ex).length) existencias[cat]=ex;
    if(Object.keys(m.traslados).length) traslados[cat]=m.traslados;
    if(m.lotes[D]&&m.lotes[D].length) lotes[cat]=m.lotes[D];
    if(Object.keys(m.lotes).length) valoracion.push(cat);
  }
  valoracion.sort();
  const out={ meta:{ generado:fechaLocalISO(), almacen_distribuidor:D,
      n_materiales:Object.keys(materiales).length, n_almacenes:Object.keys(DB.directorio.almacenes).length,
      n_con_existencia:Object.keys(existencias).length,
      meses_cpm:DB.meta?.meses_cpm||6, meses_stock:DB.meta?.meses_stock||1.5 },
    directorio:DB.directorio, materiales, existencias, traslados, lotes, valoracion };
  if(DB.consumos) out.consumos=DB.consumos;
  if(DB.nombresGenericos) out.nombresGenericos=DB.nombresGenericos;
  return out;
}
/* ---- Cifrado en navegador (replica publicar.py) ---- */
function _b64enc(buf){
  // fromCharCode con spread falla en buffers grandes; procesar en chunks de 8KB
  const u8=new Uint8Array(buf), chunk=8192;
  let s="";
  for(let i=0;i<u8.length;i+=chunk){
    s+=String.fromCharCode.apply(null, u8.subarray(i, i+chunk));
  }
  return btoa(s);
}
async function _gzip(bytes){
  const cs=new CompressionStream("gzip");
  const r=new Response(new Blob([bytes]).stream().pipeThrough(cs));
  return new Uint8Array(await r.arrayBuffer());
}
async function cifrarJS(bundle, clave){
  const plano=new TextEncoder().encode(JSON.stringify(bundle));
  const comp=await _gzip(plano);
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const iter=200000;
  const baseKey=await crypto.subtle.importKey("raw", new TextEncoder().encode(clave), "PBKDF2", false, ["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"}, baseKey,
    {name:"AES-GCM",length:256}, false, ["encrypt"]);
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, comp);
  return { v:1, alg:"AES-GCM", kdf:"PBKDF2", hash:"SHA-256", iter, gzip:true,
    salt:_b64enc(salt), iv:_b64enc(iv), ct:_b64enc(ct) };
}
async function publicarGitHub(){
  const st=$("#ghStatus");
  const repo=$("#ghRepo").value.trim(), path=$("#ghPath").value.trim(), token=$("#ghToken").value.trim();
  if(!repo||!path||!token){ st.style.color="#c0392b"; st.textContent="Faltan repo, ruta o token."; return; }
  const api=`https://api.github.com/repos/${repo}/contents/${path}`;
  const headers={ "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json" };
  st.style.color="var(--muted)"; st.textContent="Cifrando y publicando…";
  try{
    const clave=`${_K}`;
    const sobre=await cifrarJS(bundleFinal(), clave);
    let sha=null; const g=await fetch(api,{headers}); if(g.ok){ sha=(await g.json()).sha; }
    const body={ message:"Actualización "+new Date().toLocaleString('es-MX'), content:btoa(JSON.stringify(sobre)) };
    if(sha) body.sha=sha;
    const p=await fetch(api,{method:"PUT",headers,body:JSON.stringify(body)});
    if(p.ok){ st.style.color="var(--ok)"; st.textContent="✅ Publicado. Puede tardar ~1 min en GitHub Pages."; }
    else { const e=await p.json(); st.style.color="#c0392b"; st.textContent="Error "+p.status+": "+(e.message||""); }
  }catch(err){ st.style.color="#c0392b"; st.textContent="Error: "+err.message; }
}
